# HeuristicSampler 配置文件
# 用于启发式策略采样，生成预训练数据

sampling:
  num_episodes: 1000        # 采集的 episode 数量
  gamma: 0.999               # 计算 returns 的折扣因子
  eps: 0.0                  # epsilon-greedy 随机探索概率 (0.0=纯启发式, 1.0=纯随机)
  save_path: "data/heuristic_samples_pure.npz"  # 保存路径

# 环境和策略配置引用
env_config_path: "configs/MASUPEnv.yaml"
policy_config_path: "configs/ER.yaml"
