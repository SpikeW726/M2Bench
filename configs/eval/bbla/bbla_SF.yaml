# BBLA Q-table 评估配置 (SF / SFcrimemap)
# 用法:
#   python evaluators/test.py \
#     --env_config configs/eval/bbla/bbla_SF.yaml \
#     --model models/qtable-bbla-SF/iter_1000 \
#     --num_episodes 10

algo_name: qtable
env_type: bbla

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: false
  norm_reward: true
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 10000
  custom_configs:
    truncate_by_time: true
