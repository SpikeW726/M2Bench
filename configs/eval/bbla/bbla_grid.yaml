# BBLAEnv grid 评估配置（3 agents，FixedStepEnv）
# 用法:
#   python evaluators/test.py --env_config configs/eval/bbla/bbla_grid.yaml --model models/xxx/final

algo_name: qtable
env_type: bbla

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    truncate_by_time: true

eval:
  seed: 42              # 评估固定随机性；训练仍随机
  num_episodes: 10
  save_plot: evaluators/results/grid/qtable-bbla/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 300
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/grid/qtable-bbla/action_logits.csv
  action_logits_active_only: true
