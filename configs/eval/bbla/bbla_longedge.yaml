# BBLA Q-table 评估配置 (LongEdge)
# 用法:
#   python evaluators/test.py \
#     --env_config configs/eval/bbla/bbla_longedge.yaml \
#     --model models/qtable-bbla-longedge/iter_500

algo_name: qtable
env_type: bbla

env:
  graph_path: graphs/long_edge.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    truncate_by_time: true
