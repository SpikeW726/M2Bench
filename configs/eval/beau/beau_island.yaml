algo_name: happo
env_type: beau

env:
  graph_path: graphs/island.json
  enable_wait: true
  norm_reward: true
  norm_obs: true
  deltaT: 2.0
  num_agents: 6
  init_positions: [0, 10, 20, 30, 40, 49]
  episode_len: 500
  custom_configs:
    reward_scale: 0.01
    truncate_by_time: true

eval:
  num_episodes: 10
  save_plot: evaluators/results/island/happo_beau/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 800
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/island/happo_beau/action_logits.csv
  action_logits_active_only: true
