#   python evaluators/test.py --env_config configs/eval/exgbla/exgbla_grid.yaml --model models/xxx/final
algo_name: qtable
env_type: ex_gbla

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    truncate_by_time: true

eval:
  num_episodes: 10
  save_plot: evaluators/results/grid/qtable_exgbla/best_eval.png
  show_plot: false
  animation: true
  event_driven: false
  max_frames: 500
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/grid/qtable-exgbla/action_logits.csv
  action_logits_active_only: true
