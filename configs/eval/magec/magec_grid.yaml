# MAGECEnv grid 评估配置（6 agents，GraphSageActor，EventDrivenEnv）
# 用法:
#   python evaluators/test.py --env_config configs/eval/magec/magec_grid.yaml --model models/xxx/final

env_type: magec

env:
  graph_path: graphs/grid.json
  norm_reward: true
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    truncate_by_time: true
    alpha: 1.0
    beta: 0.5

eval:
  num_episodes: 10
  save_plot: evaluators/results/grid/mappo_magec/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 1000
