# masup @ chain10 评估配置
env_type: masup

env:
  graph_path: graphs/Chain10nodes9edges.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 4
  init_positions: [1, 3, 6, 9]
  episode_len: 100
  custom_configs:
    T: 10.0
    role_imformation: decision
    reward_scale: 0.05
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

eval:
  num_episodes: 10
  save_plot: evaluators/results/chain10/mappo_masup/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 300
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/chain10/mappo_masup/action_logits.csv
  action_logits_active_only: true
