# MASUPEnv LongEdge 评估配置（适用于 mappo / vdn / qmix）
# 用法:
#   python evaluators/test.py --env_config configs/eval/masup/masup_longedge.yaml --model models/xxx/final
#   python evaluators/heuristic_evaluator.py --env_config configs/eval/masup/masup_longedge.yaml --policy ER

env_type: masup

env:
  graph_path: graphs/long_edge.json
  enable_wait: true
  deltaT: 0.5
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  edge_time_jitter: False
  custom_configs:
    T: 5.0
    role_imformation: decision
    truncate_by_time: true

eval:
  num_episodes: 10
  save_plot: evaluators/results/long_edge/masup/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 500
