env_type: masup
env:
  graph_path: graphs/marostica.json
  enable_wait: true
  norm_reward: true
  deltaT: 1.0
  num_agents: 3
  init_positions:
  - 0
  - 20
  - 40
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05
eval:
  num_episodes: 10
  save_plot: evaluators/results/marostica/mappo_masup_a3/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 600
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/marostica/mappo_masup_a3/action_logits.csv
  action_logits_active_only: true
