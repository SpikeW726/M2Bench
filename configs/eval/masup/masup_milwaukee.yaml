# masup @ milwaukee 评估配置（异构预处理版本）
env_type: masup

env:
  graph_path: graphs/milwaukee.json
  enable_wait: true
  norm_reward: true
  deltaT: 8.0
  num_agents: 6
  init_positions: [0, 8, 16, 24, 32, 39]
  episode_len: 800
  custom_configs:
    T: 80.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

eval:
  num_episodes: 10
  save_plot: evaluators/results/milwaukee/mappo_masup/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 1000
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/milwaukee/mappo_masup/action_logits.csv
  action_logits_active_only: true
