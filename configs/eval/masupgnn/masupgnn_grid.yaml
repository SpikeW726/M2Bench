# MASUPGraphEnv (masup_gnn) grid 评估配置（6 agents，MPNN Actor）
# 用法:
#   python evaluators/test.py --env_config configs/eval/masupgnn/masupgnn_grid.yaml --model models/xxx/final

env_type: masup_gnn

env:
  graph_path: graphs/grid.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    truncate_by_time: true
    node_feat_dim: 2
    edge_feat_dim: 1
    global_feat_dim: 2

eval:
  num_episodes: 10
  save_plot: evaluators/results/grid/masupgnn/best_eval.png
  show_plot: false
  animation: false
  event_driven: true
  max_frames: 1000
