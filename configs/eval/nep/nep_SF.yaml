#   python evaluators/test.py \
#     --env_config configs/eval/nep/nep_SF.yaml \
#     --model models/qtable-nep-SF/iter_1000 \
#     --num_episodes 10
algo_name: qtable
env_type: nep

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    truncate_by_time: true


eval:
  seed: 42
  num_episodes: 10
  save_plot: evaluators/results/SF/qtable-nep/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 1500
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/SF/qtable-nep/action_logits.csv
  action_logits_active_only: true
