# NEPEnv grid 评估配置（3 agents，联合 Q-table，FixedStepEnv）
# 用法:
#   python evaluators/test.py --env_config configs/eval/nep/nep_grid.yaml --model models/xxx/final
#
# 注意：NEP 状态空间在 grid（50 节点）上较大（≈ 50 × C(182,2) ≈ 820K），
# Q-table 需要充足步数探索，训练预算需相应增大。

algo_name: qtable
env_type: nep

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  num_agents: 3
  init_positions: [1, 25, 50]
  episode_len: 2000

eval:
  num_episodes: 10
  save_plot: evaluators/results/grid/qtable_nep/best_eval.png
  show_plot: false
  animation: false
  event_driven: false
  max_frames: 500
