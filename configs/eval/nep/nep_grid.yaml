# NEPEnv grid 评估配置（3 agents，联合 Q-table，FixedStepEnv）
# 用法:
#   python evaluators/test.py --env_config configs/eval/nep/nep_grid.yaml --model models/xxx/final
#
# 注意：NEP 状态空间在 grid（50 节点）上较大（≈ 50 × C(182,2) ≈ 820K），
# Q-table 需要充足步数探索，训练预算需相应增大。

algo_name: qtable
env_type: nep

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    truncate_by_time: true

eval:
  num_episodes: 10
  save_plot: evaluators/results/grid/qtable_nep/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 500
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/grid/qtable-nep/action_logits.csv
  action_logits_active_only: true
