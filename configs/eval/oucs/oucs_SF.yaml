# OUCSEnv SF 评估配置（与 masup_SF 中 num_agents / init_positions / episode_len 一致）
# 用法:
#   python evaluators/test.py --env_config configs/eval/oucs/oucs_SF.yaml --model models/xxx/final

env_type: oucs

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: false
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

eval:
  num_episodes: 10
  save_plot: evaluators/results/SF/vdppo_oucs/best_eval.png
  show_plot: false
  animation: true
  event_driven: false
  max_frames: 2000
