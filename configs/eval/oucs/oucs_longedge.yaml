#   python evaluators/test.py --env_config configs/eval/oucs/oucs_longedge.yaml --model models/xxx/final
env_type: oucs

env:
  graph_path: graphs/long_edge.json
  enable_wait: false
  norm_reward: true
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

eval:
  num_episodes: 10
  save_plot: evaluators/results/long_edge/vdppo_oucs/best_eval.png
  show_plot: false
  animation: true
  event_driven: false
  max_frames: 500
