env_type: oucs

env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: false
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 300
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

eval:
  num_episodes: 10
  max_steps: 300
  save_plot: evaluators/results/TSP12/vdppo_oucs/best_eval.png
  show_plot: False
  animation: True
  event_driven: False
  max_frames: 500