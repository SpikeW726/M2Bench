# s4r1 @ chain10 评估配置
env_type: s4r1

env:
  graph_path: graphs/Chain10nodes9edges.json
  enable_wait: false
  norm_reward: true
  norm_obs: true
  num_agents: 4
  init_positions: [0, 3, 6, 9]
  episode_len: 100
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

eval:
  num_episodes: 10
  save_plot: evaluators/results/chain10/iql_s4r1/best_eval.png
  show_plot: false
  animation: true
  event_driven: false
  max_frames: 500
  log_action_logits: true
  log_action_logits_max_lines: 5
  action_logits_csv: evaluators/results/chain10/iql_s4r1/action_logits.csv
  action_logits_active_only: true
