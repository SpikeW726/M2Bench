# SUNSEnv SF 评估配置（多智能体 + intention 协调）
# 用法:
#   python evaluators/test.py --env_config configs/eval/suns/suns_SF.yaml --model models/a2c-suns-SF/final
#
# 注意: 模型由 a2c_suns_SF.yaml (单智能体) 训练，评估时以 3 个共享策略的 agent 部署

env_type: suns

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: false
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    truncate_by_time: true

eval:
  num_episodes: 10
  save_plot: evaluators/results/SF/a2c_suns/best_eval.png
  show_plot: false
  animation: true
  event_driven: false
  # SF 单智能体 steps_per_episode≈110，3 智能体并行约 330 步，max_frames=500 足够
  max_frames: 2000
