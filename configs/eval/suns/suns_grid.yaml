# SUNSEnv grid 评估配置（多智能体评估，3 agents 共享 A2C 单体训练策略）
# 用法:
#   python evaluators/test.py --env_config configs/eval/suns/suns_grid.yaml --model models/xxx/final

env_type: suns

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  norm_obs: true
  num_agents: 3
  init_positions: [1, 25, 50]
  episode_len: 500

eval:
  num_episodes: 10
  save_plot: evaluators/results/grid/a2c_suns/best_eval.png
  show_plot: false
  animation: false
  event_driven: true
  max_frames: 1000
