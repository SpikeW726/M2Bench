#   python evaluators/test.py --env_config configs/eval/suns/suns_grid.yaml --model models/xxx/final
env_type: suns

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  norm_obs: true
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500

eval:
  num_episodes: 10
  save_plot: evaluators/results/grid/a2c_suns/best_eval.png
  show_plot: false
  animation: true
  event_driven: true
  max_frames: 500
