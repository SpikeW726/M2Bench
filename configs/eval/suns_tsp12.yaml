# SUNSEnv TSP12 评估配置 (多智能体 + intention 协调)
# 用法: python evaluators/test.py --env_config configs/eval/suns_tsp12.yaml --model models/a2c-suns/final

env_type: suns

env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: false
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 300
  custom_configs:
    truncate_by_time: true
