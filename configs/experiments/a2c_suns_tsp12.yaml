# A2C + SUNSEnv (TSP12) — 单智能体训练 (论文复现)
# 用法: python train.py configs/experiments/a2c_suns_tsp12.yaml

# ---- 分发字段 ----
algo_name: a2c
env_type: suns
actor_type: sun
critic_type: sun

# ---- 实验元信息 ----
exp_name: a2c-suns
graph_name: TSP12
track_wandb: true
wandb_project: MAP-RL

# ---- 环境 ----
env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: false
  num_agents: 1
  init_positions: [0]
  episode_len: 300
  custom_configs:
    truncate_by_time: true

# ---- 算法 ----
algo:
  lr: 7.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  vf_coef: 0.5
  ent_coef: 0.01

# ---- 训练 ----
training:
  num_envs: 12
  use_subproc: true
  num_steps: 2048
  max_iterations: 1000
  save_interval: 200
  minibatch_size: 4096
  update_epochs: 1

# ---- 网络 (SUN: f1 2→4→1, f2 3→6→1) ----
actor:
  num_nodes: 12
  node_feat_dim: 2
  f1_hidden: 4
  f2_hidden: 6
critic:
  num_nodes: 12
  node_feat_dim: 2
  f1_hidden: 4
  f2_hidden: 6
