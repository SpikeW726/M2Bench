# QTable + BBLAEnv @ chain10
algo_name: qtable
env_type: bbla
exp_name: qtable-bbla-chain10
graph_name: chain10
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/Chain10nodes9edges.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 4
  init_positions: [0, 3, 6, 9]
  episode_len: 100
  custom_configs:
    truncate_by_time: true

algo:
  lr: 0.001
  gamma: 0.99
  epsilon_start: 0.2
  epsilon_end: 0.05
  sync_update: true
  epsilon_decay_steps: 4000000

training:
  num_envs: 64
  use_subproc: true
  total_steps: 20000000
  save_interval: 150
  eval_interval: 10

eval_config_path: configs/eval/bbla/bbla_chain10.yaml
