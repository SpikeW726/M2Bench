algo_name: qtable
env_type: bbla
exp_name: qtable-bbla
graph_name: TSP12
track_wandb: true
wandb_project: MAP-RL
seed: 42
env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 3
  episode_len: 10000
  custom_configs:
    truncate_by_time: true
algo:
  lr: 0.1
  gamma: 0.9
  epsilon_start: 0.1
  epsilon_end: 0.1
  sync_update: true
  epsilon_decay_steps: 40000
training:
  num_envs: 4
  use_subproc: false
  total_steps: 50000000
  save_interval: 500
  eval_interval: 50
