# Q-table + BBLA 环境 (TSP12) — 3 agents
# 用法: python train.py configs/experiments/qtable_bbla_tsp12.yaml

algo_name: qtable
env_type: bbla

exp_name: qtable-bbla
graph_name: TSP12
track_wandb: True
wandb_project: MAP-RL

env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: false
  num_agents: 3
  episode_len: 10000
  custom_configs:
    truncate_by_time: true

algo:
  lr: 0.1
  gamma: 0.9
  epsilon_start: 0.1
  epsilon_end: 0.1
  epsilon_decay: 0.9995
  sync_update: true

training:
  num_envs: 4
  use_subproc: false
  total_steps: 50000000
  save_interval: 500
