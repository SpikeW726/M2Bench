# HAPPO + BEAU @ chain10
# 图统计: nodes=10, directed_edges=18, max_out_degree=2, avg_edge=1.111, max_edge=2.000
# 物理时间截断: episode_len=100, total_steps=20000000

algo_name: happo
env_type: beau

exp_name: happo-beau-chain10
graph_name: chain10
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/Chain10nodes9edges.json
  enable_wait: true
  norm_reward: true
  norm_obs: true
  deltaT: 0.5
  num_agents: 4
  init_positions: [0, 3, 6, 9]
  episode_len: 100
  custom_configs:
    reward_scale: 0.05
    truncate_by_time: true

algo:
  gamma: 0.97
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 10.0
  lr: 5.0e-5
  policy_update_steps: 5
  factor: 0.5
  patience: 100
  hidden_dim: 64
  num_heads: 4
  encoder_layers: 2

training:
  num_envs: 1
  use_subproc: false
  num_steps: 400
  total_steps: 20000000
  save_interval: 500
  minibatch_size: 256
  update_epochs: 5
  eval_interval: 15
  eval_episodes: 4

eval_config_path: configs/eval/beau/beau_chain10.yaml
