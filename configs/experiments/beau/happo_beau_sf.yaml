# HAPPO 语境（happo = MAT PPO，实现同 mappo_mat）+ BEAU，SF 犯罪图
# 训练: python train.py configs/experiments/beau/happo_beau_sf.yaml
# 评估: python evaluators/test.py --model <save_dir>/final --env_config configs/eval/beau/beau_sf.yaml

algo_name: happo
env_type: beau

exp_name: happo-beau-sf
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: true
  norm_reward: true
  deltaT: 20.0
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  edge_time_jitter: false
  custom_configs:
    reward_scale: 0.01
    truncate_by_time: true

algo:
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 10.0
  lr: 5.0e-5
  policy_update_steps: 5
  factor: 0.5
  patience: 100
  hidden_dim: 64
  num_heads: 4
  encoder_layers: 2

training:
  # MATOnPolicyCollector 当前仅支持 num_envs=1
  num_envs: 1
  use_subproc: false
  num_steps: 600
  total_steps: 20000000
  save_interval: 1000
  minibatch_size: 256
  update_epochs: 5
  eval_interval: 20
  eval_episodes: 5

eval_config_path: configs/eval/beau/beau_sf.yaml
