algo_name: mappo_mat
env_type: beau

exp_name: mappo-mat-tsp12
graph_name: TSP12
track_wandb: true
seed: 42

env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.333
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 300
  custom_configs:
    reward_scale: 0.01
    truncate_by_time: true

algo:
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 10.0
  lr: 5.0e-5
  policy_update_steps: 5
  factor: 0.5
  patience: 100
  hidden_dim: 64
  num_heads: 4
  encoder_layers: 2

training:
  num_envs: 1
  use_subproc: false
  num_steps: 600
  total_steps: 2000000
  save_interval: 200
  minibatch_size: 64
  update_epochs: 5
  eval_interval: 0
