# QTable + ExGBLAEnv (SF / SFcrimemap)
#   action_space: Discrete(max_neighbors+1=12)
algo_name: qtable
env_type: ex_gbla
exp_name: qtable-ex_gbla-SF
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    truncate_by_time: true

algo:
  lr: 0.001
  gamma: 0.99
  epsilon_start: 0.2
  epsilon_end: 0.05
  sync_update: true
  epsilon_decay_steps: 5000000

training:
  num_envs: 64
  use_subproc: true
  total_steps: 40000000
  save_interval: 1000
  eval_interval: 5
