#   action_space: Discrete(max_degree=7)
algo_name: qtable
env_type: gbla
exp_name: qtable-gbla-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    truncate_by_time: true

algo:
  lr: 0.00008139615210618713
  gamma: 0.99
  epsilon_start: 1
  epsilon_end: 0.05
  sync_update: true
  epsilon_decay_steps: 10852172.235671202

training:
  num_envs: 64
  use_subproc: true
  total_steps: 50000000
  save_interval: 300
  eval_interval: 10
