# QTable + GBLAEnv (grid) — 含邻居意图扩展观测
# 用法: python train.py configs/experiments/gbla/qtable_gbla_grid.yaml
#
# grid 图特性:
#   50 节点，max_degree=7，边权 2~6（均值≈2.2），FixedStepEnv (dt=1)
#   obs_space: Box(int32, 4+max_neighbors=11) → BBLA obs + 邻居意图向量
#   action_space: Discrete(max_degree=7)
#   GBLA 在 BBLA 基础上加入邻居 intention，grid 图下每 agent 最多 7 个邻居
#   obs_dim=11，状态空间比 SF (obs_dim=15) 略小

algo_name: qtable
env_type: gbla
exp_name: qtable-gbla-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  num_agents: 3
  init_positions: [1, 25, 50]
  episode_len: 2000
  custom_configs:
    truncate_by_time: true

algo:
  lr: 0.1
  gamma: 0.97
  epsilon_start: 0.2
  epsilon_end: 0.05
  sync_update: true
  # grid obs_dim=11（vs SF=15），状态复杂度中等，适中的衰减步长
  epsilon_decay_steps: 100000

training:
  num_envs: 8
  use_subproc: true
  total_steps: 30000000
  save_interval: 1000
  eval_interval: 50
