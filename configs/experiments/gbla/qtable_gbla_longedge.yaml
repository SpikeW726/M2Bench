algo_name: qtable
env_type: gbla
exp_name: qtable-gbla-longedge
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL
seed: 42
env:
  graph_path: graphs/long_edge.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 3
  init_positions:
  - 0
  - 1
  - 2
  episode_len: 100
  custom_configs:
    truncate_by_time: true
algo:
  lr: 0.1
  gamma: 0.99
  epsilon_start: 0.1
  epsilon_end: 0.05
  sync_update: true
  epsilon_decay_steps: 27726400
training:
  num_envs: 16
  use_subproc: true
  total_steps: 10000000
  save_interval: 1000
  eval_interval: 50
