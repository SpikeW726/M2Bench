# ---- 分发字段 ----
algo_name: iql
env_type: s4r1
q_type: mlp

# ---- 实验元信息 ----
exp_name: iql-s4r1
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL

# ---- 环境 ----
env:
  graph_path: graphs/long_edge.json
  enable_wait: false
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

# ---- 算法 ----
algo:
  sync_replay: true    # 启用经验回放同步
  lr: 0.00075
  gamma: 0.95
  tau: 0.001
  target_update_freq: 1
  epsilon_start: 0.95
  epsilon_end: 0.005
  epsilon_decay: 0.9998
  use_double_dqn: true
  shared_policy: false

# ---- 训练 ----
training:
  num_envs: 16
  use_subproc: true
  num_steps: 64
  total_steps: 10000000
  save_interval: 500
  batch_size: 32
  warmup_steps: 10000
  buffer_size: 100000
  collect_per_step: 12
  update_per_step: 1

# ---- Q-network ----
q_network:
  hidden: [128, 84]
  dueling: True
