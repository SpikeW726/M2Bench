algo_name: mappo
env_type: magec
actor_type: sage
critic_type: mlp

exp_name: mappo-magec-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  norm_reward: true
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    truncate_by_time: true
    alpha: 1.0
    beta: 0.5

algo:
  use_active_mask: true
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  gamma: 0.999
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  shared_policy: true

# max_iterations = ceil(20M / 4096) = 4883
training:
  num_envs: 64
  use_subproc: true
  num_steps: 1024
  total_steps: 50000000
  save_interval: 200
  minibatch_size: 2048
  update_epochs: 5
  eval_interval: 10

#   grid: max_degree=7, action_dim=8 (7+1 no-op)
#   node_feat_dim=3: [nodeType, phi_idleness_norm, degree]
#   edge_feat_dim=2: [weight_norm, neighborIndex]
#   global_feat_dim=2: [avg_phi_idle_norm, worst_phi_idle_norm]
actor:
  graph_path: graphs/grid.json
  agent_num: 6
  role_imformation: agent-index
  hidden_dim: 64
  gnn_layers: 2
  actor_mlp_layers: 1
  mlp_activation: relu
  node_feat_dim: 3
  edge_feat_dim: 2
  global_feat_dim: 2
  neighbor_scoring: true
  use_jk: true

critic:
  hidden: [256, 256]
