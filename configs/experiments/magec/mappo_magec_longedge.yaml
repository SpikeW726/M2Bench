algo_name: mappo
env_type: magec
actor_type: sage
critic_type: mlp

exp_name: mappo-magec-longedge
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL
seed: 42

# state_dim = num_nodes + num_nodes^2 = 4 + 16 = 20
env:
  graph_path: graphs/long_edge.json
  norm_reward: true
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    truncate_by_time: true
    alpha: 1.0
    beta: 0.5

algo:
  use_active_mask: true
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  shared_policy: true

training:
  num_envs: 8
  use_subproc: True
  num_steps: 512
  total_steps: 10000000
  save_interval: 1000
  minibatch_size: 2048
  update_epochs: 5
  eval_interval: 10

#   long_edge.json: max_degree=3, action_dim=4
#   node_feat_dim=3: [nodeType, phi_idleness_norm, degree]
#   edge_feat_dim=2: [weight_norm, neighborIndex]
#   global_feat_dim=2: [avg_phi_idle_norm, worst_phi_idle_norm]
actor:
  graph_path: graphs/long_edge.json
  agent_num: 3
  role_imformation: agent-index
  hidden_dim: 64
  gnn_layers: 2
  actor_mlp_layers: 1
  mlp_activation: relu
  node_feat_dim: 3
  edge_feat_dim: 2
  global_feat_dim: 2
  neighbor_scoring: true
  use_jk: True

critic:
  hidden: [256, 256]
