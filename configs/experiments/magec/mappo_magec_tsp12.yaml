algo_name: mappo
env_type: magec
actor_type: sage
critic_type: mlp

exp_name: mappo-magec-tsp12
graph_name: TSP12
track_wandb: True
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/simple_TSP_12.json
  norm_reward: true
  num_agents: 3
  episode_len: 300
  custom_configs:
    truncate_by_time: true
    alpha: 1.0
    beta: 0.5

algo:
  use_active_mask: true
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  shared_policy: true

training:
  num_envs: 8
  use_subproc: true
  num_steps: 512
  total_steps: 10000000
  save_interval: 200
  minibatch_size: 2048
  update_epochs: 5
  eval_interval: 10

#   node_feat_dim=3: [nodeType, phi_idleness_norm, degree]
#   edge_feat_dim=2: [weight_norm, neighborIndex]
actor:
  graph_path: graphs/simple_TSP_12.json
  agent_num: 3
  role_imformation: agent-index
  hidden_dim: 64
  gnn_layers: 5
  actor_mlp_layers: 1
  mlp_activation: relu
  node_feat_dim: 3
  edge_feat_dim: 2
  global_feat_dim: 2
  neighbor_scoring: true
  use_jk: false

# state_dim = num_nodes + num_nodes^2 = 12 + 144 = 156
critic:
  hidden: [256, 256]
