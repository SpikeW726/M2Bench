# IPPO + MASUPEnv (LongEdge) — 从零训练
# 用法: python train.py configs/experiments/masup/ippo_masup_longedge.yaml

# ---- 分发字段 ----
algo_name: ippo
env_type: masup
actor_type: mlp
critic_type: mlp

# ---- 实验元信息 ----
exp_name: ippo-longedge
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
env:
  graph_path: graphs/long_edge.json
  enable_wait: true
  deltaT: 0.5
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    T: 10.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

# ---- 算法 ----
algo:
  use_active_mask: true
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01

# ---- 训练 ----
training:
  num_envs: 24
  use_subproc: true
  num_steps: 1024
  total_steps: 20000000
  save_interval: 1000
  minibatch_size: 4096
  update_epochs: 5

# ---- 网络 ----
actor:
  hidden: [256, 256]
critic:
  hidden: [256, 256]