# ---- 分发字段 ----
algo_name: mappo
env_type: masup
actor_type: mlp
critic_type: mlp

# ---- 实验元信息 ----
exp_name: mappo-scratch-3a
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: true
  deltaT: 1.0
  num_agents: 3
  # init_positions: [0]
  init_positions: [0, 5, 11]
  episode_len: 3000
  edge_time_jitter: false
  custom_configs:
    T: 200.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

# ---- 算法 ----
algo:
  use_active_mask: True
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  gamma: 0.999
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  use_value_norm: true

# ---- 训练 ----
training:
  num_envs: 16
  use_subproc: true
  num_steps: 2048
  total_steps: 50000000
  save_interval: 200
  minibatch_size: 4096
  update_epochs: 5
  eval_interval: 10

# ---- 网络 ----
actor:
  hidden: [256, 256]
critic:
  hidden: [256, 256]