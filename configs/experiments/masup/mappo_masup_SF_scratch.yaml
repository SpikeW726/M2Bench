algo_name: mappo
env_type: masup
actor_type: masup_mlp
critic_type: masup_mlp

exp_name: mappo-SF-preproc
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: true
  deltaT: 20.0
  norm_reward: true
  num_agents: 3
  # init_positions: [0]
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    T: 150.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.1
    contribution_scale: 0.05

algo:
  use_active_mask: True
  actor_lr: 0.000020059505125622627
  critic_lr: 0.00024855789011606153
  gamma: 0.999
  gae_lambda: 0.9265879928588024
  clip_range: 0.12228213247621536
  vf_coef: 1.4906293022092203
  ent_coef: 0.04946730194744175
  use_value_norm: true

training:
  num_envs: 108
  use_subproc: true
  num_steps: 2048
  total_steps: 50000000
  save_interval: 200
  minibatch_size: 1024
  update_epochs: 5
  eval_interval: 50

actor:
  graph_path: graphs/SFcrimemap.json
  num_agents: 3
  num_nodes: 12
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 150.0
  hidden: [256, 256]

critic:
  graph_path: graphs/SFcrimemap.json
  num_agents: 3
  num_nodes: 12
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 150.0
  input_mode: state
  hidden: [256, 256]

