# MAPPO + MASUPEnv @ chain10
# 图统计: nodes=10, directed_edges=18, max_out_degree=2, avg_edge=1.111, max_edge=2.000
# 物理时间截断: episode_len=100, total_steps=20000000

algo_name: mappo
env_type: masup
actor_type: masup_mlp
critic_type: masup_mlp

exp_name: mappo-masup-chain10
graph_name: chain10
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/Chain10nodes9edges.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 4
  init_positions: [0, 3, 6, 9]
  episode_len: 100
  custom_configs:
    T: 10.0
    role_imformation: decision
    reward_scale: 0.05
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  use_active_mask: true
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  use_value_norm: true

training:
  num_envs: 64
  use_subproc: true
  num_steps: 512
  total_steps: 20000000
  save_interval: 100
  minibatch_size: 1024
  update_epochs: 5
  eval_interval: 10

actor:
  graph_path: graphs/Chain10nodes9edges.json
  num_agents: 4
  num_nodes: 10
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 10.0
  hidden: [256, 256]

critic:
  graph_path: graphs/Chain10nodes9edges.json
  num_agents: 4
  num_nodes: 10
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 10.0
  input_mode: state
  hidden: [256, 256]

eval_config_path: configs/eval/masup/masup_chain10.yaml
