# MAPPO + MASUPEnv @ cumberland
# 图统计: nodes=40, directed_edges=88, max_out_degree=4, avg_edge=5.702, max_edge=13.275
# 物理时间截断: episode_len=500, total_steps=40000000

algo_name: mappo
env_type: masup
actor_type: masup_mlp
critic_type: masup_mlp

exp_name: mappo-masup-cumberland
graph_name: cumberland
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/cumberland.json
  enable_wait: true
  norm_reward: true
  deltaT: 4.0
  num_agents: 6
  init_positions: [0, 8, 16, 24, 32, 39]
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.1
    contribution_scale: 0.1

algo:
  use_active_mask: true
  actor_lr: 0.0002138941043133317
  critic_lr: 0.0011021765437482303
  gamma: 0.999
  gae_lambda: 0.999
  clip_range: 0.11203363035624152
  vf_coef: 0.653248006662287
  ent_coef: 0.03701534276270355
  use_value_norm: true

training:
  num_envs: 64
  use_subproc: true
  num_steps: 2048
  total_steps: 40000000
  save_interval: 200
  minibatch_size: 8192
  update_epochs: 5
  eval_interval: 20

actor:
  graph_path: graphs/cumberland.json
  num_agents: 6
  num_nodes: 40
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: true
  T_time: 50.0
  hidden: [256, 512]

critic:
  graph_path: graphs/cumberland.json
  num_agents: 6
  num_nodes: 40
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: true
  T_time: 50.0
  input_mode: state
  hidden: [256, 512]

eval_config_path: configs/eval/masup/masup_cumberland.yaml
