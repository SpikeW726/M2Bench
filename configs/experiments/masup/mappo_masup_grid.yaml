# MAPPO + MASUPEnv (grid) — masup_mlp 预处理网络
# 用法: python train.py configs/experiments/masup/mappo_masup_grid.yaml
#
# grid 图特性:
#   49 节点 (7×7)，规则网格，边权均匀（均值≈3-4），6 agents
#   episode_len=500, T=50 → episode 完成频繁，γ 不必过高
#   EventDrivenEnv: 每步推进到下一 agent 到达事件

algo_name: mappo
env_type: masup
actor_type: masup_mlp
critic_type: masup_mlp

exp_name: mappo-masup-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  use_active_mask: true
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  use_value_norm: true

training:
  num_envs: 24
  use_subproc: true
  num_steps: 1024
  total_steps: 20000000
  save_interval: 500
  minibatch_size: 2048
  update_epochs: 5
  eval_interval: 10

actor:
  hidden: [256, 256]
  graph_path: graphs/grid.json
  num_agents: 6
critic:
  hidden: [256, 256]
  graph_path: graphs/grid.json
  num_agents: 6
