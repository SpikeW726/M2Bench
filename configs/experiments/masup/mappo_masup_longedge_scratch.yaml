# MAPPO + MASUPEnv (TSP12) — 从零训练 (无预训练)
# 用法: python train.py configs/experiments/mappo_tsp12_scratch.yaml

# ---- 分发字段 ----
algo_name: mappo
env_type: masup
actor_type: mlp
critic_type: mlp

# ---- 实验元信息 ----
exp_name: mappo-scratch
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
env:
  graph_path: graphs/long_edge.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    T: 5.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

# ---- 算法 ----
algo:
  use_active_mask: True
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01

# ---- 训练 ----
training:
  num_envs: 12
  use_subproc: true
  num_steps: 2048
  total_steps: 10000000
  save_interval: 1000
  minibatch_size: 4096
  update_epochs: 5
  eval_interval: 10

# ---- 网络 ----
actor:
  hidden: [256, 256]
critic:
  hidden: [256, 256]
