# MAPPO + MASUPEnv (TSP12) — 从零训练 (无预训练)
# 用法: python train.py configs/experiments/mappo_tsp12_scratch.yaml

# ---- 分发字段 ----
algo_name: mappo
env_type: masup
actor_type: mlp
critic_type: mlp

# ---- 实验元信息 ----
exp_name: mappo-scratch
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
env:
  graph_path: graphs/long_edge.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    T: 5.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

# ---- 算法 ----
algo:
  use_active_mask: True
  actor_lr: 0.000042275431686468945
  critic_lr: 0.0018140384295011584
  gamma: 0.999
  gae_lambda: 0.9185866781728964
  clip_range: 0.3188303982937587
  vf_coef: 1.1085035143266433
  ent_coef: 0.08350742025925834

# ---- 训练 ----
training:
  num_envs: 12
  use_subproc: true
  num_steps: 4096
  total_steps: 20000000
  save_interval: 1000
  minibatch_size: 256
  update_epochs: 10
  eval_interval: 50

# ---- 网络 ----
actor:
  hidden: [256, 256]
critic:
  hidden: [256, 256]
