# MAPPO + MASUPEnv @ mapA
algo_name: mappo
env_type: masup
actor_type: masup_mlp
critic_type: masup_mlp

exp_name: mappo-masup-mapA
graph_name: mapA
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/mapA.json
  enable_wait: true
  norm_reward: true
  deltaT: 3.0
  num_agents: 6
  init_positions: [0, 10, 20, 30, 40, 49]
  episode_len: 500
  custom_configs:
    T: 75
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  use_active_mask: true
  actor_lr: 0.000036645286713034295
  critic_lr: 0.000008143780168569943
  gamma: 0.999
  gae_lambda: 0.999
  clip_range: 0.2787890118448441
  vf_coef: 0.9590039923291804
  ent_coef: 0.0030331703605243066
  use_value_norm: true

training:
  num_envs: 80
  use_subproc: true
  num_steps: 2048
  total_steps: 50000000
  save_interval: 200
  minibatch_size: 8192
  update_epochs: 10
  eval_interval: 200
actor:
  graph_path: graphs/mapA.json
  num_agents: 6
  num_nodes: 50
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: true
  T_time: 37.5
  hidden: [256, 512]

critic:
  graph_path: graphs/mapA.json
  num_agents: 6
  num_nodes: 50
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: true
  T_time: 37.5
  input_mode: state
  hidden: [256, 512]

eval_config_path: configs/eval/masup/masup_mapA.yaml

actor_path: models/imi-mappo-pre-masup-mapA-075T/imi_pre_masup_mlp_mappo_mapA_075T__1782925182_final/policy.pt
critic_path: models/imi-mappo-pre-masup-mapA-075T/imi_pre_masup_mlp_mappo_mapA_075T__1782925182_final/critic.pt