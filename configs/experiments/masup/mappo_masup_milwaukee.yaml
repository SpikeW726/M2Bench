algo_name: mappo
env_type: masup
actor_type: masup_mlp
critic_type: masup_mlp

exp_name: mappo-masup-milwaukee
graph_name: milwaukee
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/milwaukee.json
  enable_wait: true
  norm_reward: true
  deltaT: 8.0
  num_agents: 6
  init_positions: [0, 8, 16, 24, 32, 39]
  episode_len: 800
  custom_configs:
    T: 80.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  use_active_mask: true
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  gamma: 0.999
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  use_value_norm: true

training:
  num_envs: 64
  use_subproc: true
  num_steps: 1024
  total_steps: 50000000
  save_interval: 200
  minibatch_size: 2048
  update_epochs: 5
  eval_interval: 10

actor:
  graph_path: graphs/milwaukee.json
  num_agents: 6
  num_nodes: 40
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 80.0
  hidden: [256, 512]

critic:
  graph_path: graphs/milwaukee.json
  num_agents: 6
  num_nodes: 40
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 80.0
  input_mode: state
  hidden: [256, 512]

eval_config_path: configs/eval/masup/masup_milwaukee.yaml
