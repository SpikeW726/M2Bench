# QMIX + MASUPEnv (SF / SFcrimemap)
# 用法: python train.py configs/experiments/masup/qmix_masup_SF.yaml

algo_name: qmix
env_type: masup
q_type: rnn

exp_name: qmix-SF
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: true
  deltaT: 20.0
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  norm_reward: true
  custom_configs:
    T: 200.0
    role_imformation: decision
    reward_scale: 0.1
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  lr: 1.0e-4
  gamma: 0.99
  tau: 1.0
  target_update_freq: 200
  epsilon_start: 1.0
  epsilon_end: 0.05
  # global env step 线性衰减至 epsilon_end（非 iteration / 非 per-update）
  epsilon_decay_steps: 2500000
  use_double_dqn: true
  shared_policy: true
  reward_global: true
  shared_sync: false
  mixer_embed_dim: 256
  peng_q_lambda: true
  peng_lambda: 0.5
  seq_len: 20
  max_episodes: 2000
  burn_in_len: 0

training:
  num_envs: 108
  use_subproc: true
  num_steps: 512
  total_steps: 10000000
  save_interval: 500
  batch_size: 256
  warmup_steps: 5000
  buffer_size: 500000
  collect_per_step: 108
  update_per_step: 1
  eval_interval: 25
  eval_episodes: 1

q_network:
  # hidden: [256, 256]
  rnn_type: gru
  hidden_size: 256
  num_layers: 1
  dueling: false
