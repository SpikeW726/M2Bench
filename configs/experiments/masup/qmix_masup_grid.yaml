algo_name: qmix
env_type: masup
q_type: mlp

exp_name: qmix-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  lr: 1.0e-4
  gamma: 0.99
  tau: 1.0
  target_update_freq: 200
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 598
  use_double_dqn: true
  shared_policy: true
  reward_global: true
  shared_sync: true
  mixer_embed_dim: 32

training:
  num_envs: 24
  use_subproc: true
  num_steps: 64
  total_steps: 20000000
  save_interval: 500
  batch_size: 256
  warmup_steps: 2000
  buffer_size: 50000
  collect_per_step: 24
  update_per_step: 1
  eval_interval: 25

q_network:
  hidden: [256, 256]
  dueling: false
