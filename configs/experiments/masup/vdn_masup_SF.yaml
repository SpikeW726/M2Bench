# VDN + MASUPEnv (SF / SFcrimemap)
# 用法: python train.py configs/experiments/masup/vdn_masup_SF.yaml

algo_name: vdn
env_type: masup
q_type: mlp

exp_name: vdn-SF
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: true
  deltaT: 0.333
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    T: 200.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  lr: 1.0e-4
  gamma: 0.99
  tau: 1.0
  target_update_freq: 200
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.995
  use_double_dqn: true
  shared_policy: true
  reward_global: true

training:
  num_envs: 64
  use_subproc: true
  num_steps: 64
  total_steps: 10000000
  save_interval: 500
  batch_size: 256
  warmup_steps: 5000
  buffer_size: 50000
  collect_per_step: 24
  update_per_step: 1

q_network:
  hidden: [256, 256]
  dueling: false
