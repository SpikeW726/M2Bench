# VDN + MASUPEnv (SF / SFcrimemap)，Q-network 为 QRNN (DRQN 风格序列训练)
# 用法: python train.py configs/experiments/masup/vdn_masup_SF.yaml

algo_name: vdn
env_type: masup
# q_type: rnn
q_type: mlp

exp_name: vdn-SF
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: true
  deltaT: 20.0
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  edge_time_jitter: false
  norm_reward: true
  custom_configs:
    T: 200.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  lr: 1.0e-6
  gamma: 0.99
  tau: 1.0
  target_update_freq: 200
  epsilon_start: 1.0
  epsilon_end: 0.05
  # global env step 线性衰减至 epsilon_end（与 IQL/QMIX 一致语义）
  epsilon_decay_steps: 2500000
  use_double_dqn: false
  shared_policy: true
  reward_global: false
  shared_sync: true
  # # RNN Q-network：EpisodeReplayBuffer + 固定长度子序列训练
  # seq_len: 20
  # max_episodes: 5000

training:
  num_envs: 64
  use_subproc: true
  num_steps: 512
  total_steps: 10000000
  save_interval: 500
  batch_size: 256
  warmup_steps: 5000
  buffer_size: 50000
  collect_per_step: 16
  update_per_step: 1
  eval_interval: 25

q_network:
  # rnn_type: gru
  # hidden_size: 128
  # num_layers: 1
  hidden: [256, 256]
  dueling: false
