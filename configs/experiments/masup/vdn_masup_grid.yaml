# VDN + MASUPEnv (grid) — masup_q_mlp 预处理 Q-network
# 用法: python train.py configs/experiments/masup/vdn_masup_grid.yaml
#
# grid 图: 49 节点 (7×7)，边权均匀，6 agents，episode 完成频繁
# VDN: 共享策略 + reward_global + shared_sync

algo_name: vdn
env_type: masup
q_type: masup_q_mlp

exp_name: vdn-masup-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  lr: 1.0e-4
  gamma: 0.99
  tau: 1.0
  target_update_freq: 200
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 1000
  use_double_dqn: true
  shared_policy: true
  reward_global: true
  shared_sync: true

training:
  num_envs: 64
  use_subproc: true
  num_steps: 64
  total_steps: 20000000
  save_interval: 500
  batch_size: 256
  warmup_steps: 2000
  buffer_size: 50000
  collect_per_step: 24
  update_per_step: 1
  eval_interval: 10

q_network:
  # ===== MASUP 异构预处理参数 =====
  graph_path: graphs/grid.json
  num_agents: 6
  num_nodes: 50
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 50.0
  # ===== Q-network 主干参数 =====
  hidden: [256, 256]
  dueling: false
