# VDN + MASUPEnv (LongEdge)
# 用法: python train.py configs/experiments/masup/vdn_masup_longedge.yaml

# ---- 分发字段 ----
algo_name: vdn
env_type: masup
q_type: mlp

# ---- 实验元信息 ----
exp_name: vdn-longedge
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
env:
  graph_path: graphs/long_edge.json
  enable_wait: true
  deltaT: 0.5
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    T: 10.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

# ---- 算法 ----
algo:
  lr: 0.00004552319235447177
  gamma: 0.98
  tau: 1.0
  target_update_freq: 100
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 500000
  use_double_dqn: true
  shared_policy: true
  reward_global: true
  max_grad_norm: 1

# ---- 训练 ----
training:
  num_envs: 24
  use_subproc: true
  num_steps: 128
  total_steps: 10000000
  save_interval: 500
  batch_size: 256
  warmup_steps: 5000
  buffer_size: 50000
  collect_per_step: 16
  update_per_step: 1
  eval_interval: 25

# ---- Q-network ----
q_network:
  hidden: [256, 256]
  dueling: false