# VDN + MASUPEnv (TSP12)
# 用法: python train.py configs/experiments/vdn_masup_tsp12.yaml

# ---- 分发字段 ----
algo_name: vdn
env_type: masup
q_type: mlp

# ---- 实验元信息 ----
exp_name: vdn-tsp12
graph_name: TSP12
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: true
  deltaT: 0.333
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 300
  custom_configs:
    T: 20.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

# ---- 算法 ----
algo:
  lr: 1.0e-4
  gamma: 0.99
  tau: 1.0
  target_update_freq: 200
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 598
  use_double_dqn: true
  shared_policy: true
  reward_global: true

# ---- 训练 ----
training:
  num_envs: 12
  use_subproc: true
  num_steps: 64
  total_steps: 50000000  # 50M env steps; max_iterations = ceil(total_steps / (num_envs * num_steps))
  save_interval: 500
  batch_size: 256
  warmup_steps: 10000
  buffer_size: 100000
  collect_per_step: 12
  update_per_step: 1
  eval_interval: 25

# ---- Q-network ----
q_network:
  hidden: [256, 256]
  dueling: false
