# VDPPO (MLP) + MASUPEnv (SF / SFcrimemap)
# 用法: python train.py configs/experiments/masup/vdppo_masup_SF.yaml

algo_name: vdppo
env_type: masup
actor_type: mlp
q_type: rnn

exp_name: vdppo-SF
graph_name: SF
track_wandb: true
wandb_project: MAP-RL

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: true
  deltaT: 0.333
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    T: 200.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  use_active_mask: true
  actor_lr: 5.0e-4
  q_lr: 5.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  target_kl: 0.3
  tau: 0.1
  target_update_freq: 1
  q_clip_range: null
  mixer_embed_dim: 64
  data_chunk_length: 10
  reward_global: true

training:
  num_envs: 24
  use_subproc: true
  num_steps: 2048
  total_steps: 20000000
  save_interval: 200
  minibatch_size: 4096
  update_epochs: 5

actor:
  hidden: [256, 256]
q_network:
  rnn_type: gru
  hidden_size: 64
  num_layers: 1
  dueling: true
