# VDPPO + MASUPEnv (grid) — masup_mlp actor + RNN Q-network
# 用法: python train.py configs/experiments/masup/vdppo_masup_grid.yaml

algo_name: vdppo
env_type: masup
actor_type: masup_mlp
q_type: masup_vdppo_rnn

exp_name: vdppo-masup-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

algo:
  use_active_mask: true
  actor_lr: 5.0e-4
  q_lr: 5.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  target_kl: 0.3
  tau: 0.1
  target_update_freq: 1
  q_clip_range: null
  mixer_embed_dim: 64
  data_chunk_length: 10
  reward_global: true

training:
  num_envs: 24
  use_subproc: true
  num_steps: 1024
  total_steps: 20000000
  save_interval: 500
  minibatch_size: 2048
  update_epochs: 5
  eval_interval: 10

actor:
  # MASUP 异构预处理（须与 env.custom_configs 一致）
  graph_path: graphs/grid.json
  num_agents: 6
  num_nodes: 50   # 与 graphs/grid.json 节点数一致（省略时代码会按图自动修正）
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 50.0
  hidden: [256, 256]

q_network:
  # state 段预处理器；one_hot / prev_act 段直通（内部 role 占位为 agent-index）
  graph_path: graphs/grid.json
  num_agents: 6
  num_nodes: 50
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 50.0
  rnn_type: gru
  hidden_size: 64
  num_layers: 1
  dueling: true
