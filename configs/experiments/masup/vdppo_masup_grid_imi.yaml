algo_name: vdppo
env_type: masup
actor_type: mlp
q_type: rnn

exp_name: vdppo-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42
actor_path: models/vdppo-masup-grid-imi/imi_masup_vdppo__1775752057_final/policy.pt

env:
  graph_path: graphs/grid.json
  enable_wait: true
  deltaT: 0.5
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.0
    contribution_scale: 0.0

algo:
  use_active_mask: true
  actor_lr: 5.0e-4
  q_lr: 5.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.02
  target_kl: 0.3
  tau: 0.1
  target_update_freq: 1
  q_clip_range: null
  mixer_embed_dim: 64
  data_chunk_length: 10
  reward_global: true
  # 冻结 actor 前 N 次 update（Q-network 热身），避免随机 Q 值破坏预训练 actor
  # grid: 1024 steps×24 envs=24576 steps/iter，200 iters ≈ 4.9M steps 热身
  freeze_actor_iters: 200

training:
  num_envs: 24
  use_subproc: true
  num_steps: 1024
  total_steps: 20000000
  save_interval: 500
  minibatch_size: 2048
  update_epochs: 5

actor:
  hidden: [512, 256, 128]
q_network:
  rnn_type: gru
  hidden_size: 64
  num_layers: 1
  dueling: true
