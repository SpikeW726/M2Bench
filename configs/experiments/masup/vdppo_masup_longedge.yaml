# VDPPO + GRU + MASUPEnv (LongEdge)
# 用法: python train.py configs/experiments/masup/vdppo_masup_longedge.yaml

# ---- 分发字段 ----
algo_name: vdppo
env_type: masup
actor_type: rnn
q_type: mlp

# ---- 实验元信息 ----
exp_name: vdppo-longedge
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL

# ---- 环境 ----
env:
  graph_path: graphs/long_edge.json
  enable_wait: true
  deltaT: 0.5
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100
  custom_configs:
    T: 10.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05

# ---- 算法 ----
algo:
  use_active_mask: true
  actor_lr: 0.0008729125567828052
  q_lr: 0.00023306508346791785
  gamma: 0.999
  gae_lambda: 0.9727239324876372
  clip_range: 0.13870308892931396
  vf_coef: 0.7376251138119195
  ent_coef: 0.01491300639494596
  target_kl: 0.3
  tau: 0.04216615809781592
  target_update_freq: 1
  q_clip_range: null
  mixer_embed_dim: 64
  data_chunk_length: 10

# ---- 训练 ----
training:
  num_envs: 24
  use_subproc: true
  num_steps: 1024
  total_steps: 10000000
  save_interval: 1000
  minibatch_size: 4096
  update_epochs: 10

# ---- 网络 ----
actor:
  rnn_type: gru
  hidden_size: 64
  num_layers: 1
  fc_hidden: [256, 256]

q_network:
  hidden: [64, 64]
  dueling: true
