# MAPPO + MPNN Actor + MASUPGraphEnv (SF) — 从零训练
# 用法（直接训练）:
#   python train.py configs/experiments/masupgnn/mappo_masupgnn_SF.yaml
#
# 用法（sweep base）:
#   python sweep.py \
#     --base-config configs/experiments/masupgnn/mappo_masupgnn_SF.yaml \
#     --sweep-config configs/sweep/masupgnn/mappo_mpnn_masupgnn.yaml \
#     --eval-config configs/eval/masupgnn/masupgnn_SF.yaml \
#     --count 40
#
# SF 图特性:
#   12 节点，全连通 (max_degree=11, action_dim=12)
#   边权 6.1~53.9 (均值≈27.3)，phi ∈ {0.256,...,1.0}
#   EventDrivenEnv: 每步推进到下一智能体到达事件
#   steps_per_episode ≈ 3000/(27.3/3) ≈ 330 步
#   → num_steps=1024 覆盖 ~3 episode，正常记录 reward
#
# step_per_iteration = 12 × 1024 = 12288，max_iterations = ceil(10M/12288) = 814

# ---- 分发字段 ----
algo_name: mappo
env_type: masup_gnn
actor_type: mpnn
critic_type: mlp

# ---- 实验元信息 ----
exp_name: mappo-masupgnn-SF
graph_name: SF
track_wandb: true
wandb_project: MAP-RL

# ---- 环境 ----
# T: 时间归一化常数，与 SF 的 episode_len=3000 和平均边长≈27.3 匹配
env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: true
  deltaT: 0.333
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    T: 200.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05
    node_feat_dim: 2
    edge_feat_dim: 1
    global_feat_dim: 2

# ---- 算法 ----
algo:
  use_active_mask: true
  actor_lr: 3.0e-5
  critic_lr: 3.0e-4
  gamma: 0.999
  gae_lambda: 1.0
  clip_range: 0.2
  vf_coef: 1.0
  ent_coef: 0.1
  clip_vloss: true
  use_lr_scheduler: true
  actor_lr_start_factor: 1.0
  actor_lr_end_factor: 0.1
  actor_lr_decay_ratio: 0.8
  critic_lr_start_factor: 1.0
  critic_lr_end_factor: 0.1
  critic_lr_decay_ratio: 0.8

# ---- 训练 ----
training:
  num_envs: 12
  use_subproc: true
  num_steps: 1024
  total_steps: 10000000
  save_interval: 400
  minibatch_size: 2048
  update_epochs: 5

# ---- 网络 ----
# SF: 12 节点，全连通（1跳可达所有邻居），gnn_layers=3 提供足够表达力
actor:
  graph_path: graphs/SFcrimemap.json
  agent_num: 3
  role_imformation: decision
  hidden_dim: 64
  gnn_layers: 3
  actor_mlp_layers: 1
  gnn_mlp_layers: 2
  mlp_activation: relu
  node_feat_dim: 2
  edge_feat_dim: 1
  global_feat_dim: 2

critic:
  hidden: [256, 256]
