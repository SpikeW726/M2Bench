# MAPPO + MPNN Actor + MASUPGraphEnv (grid) — 从零训练
# 用法（直接训练）:
#   python train.py configs/experiments/masupgnn/mappo_masupgnn_grid.yaml
#
# 用法（sweep base）:
#   python sweep.py \
#     --base-config configs/experiments/masupgnn/mappo_masupgnn_grid.yaml \
#     --sweep-config configs/sweep/masupgnn/mappo_mpnn_masupgnn.yaml \
#     --eval-config configs/eval/masupgnn/masupgnn_grid.yaml \
#     --count 40
#
# grid 图特性:
#   50 节点，max_degree=7，边权 2~6（均值≈2.2），phi 全 1
#   EventDrivenEnv: 每步推进到下一智能体到达事件
#   steps_per_episode ≈ 500/2.2 ≈ 227 步
#   → num_steps=512 可覆盖 ~2.2 个 episode
#
# step_per_iteration = 12 × 512 = 6144，max_iterations = ceil(20M/6144) = 3256

# ---- 分发字段 ----
algo_name: mappo
env_type: masup_gnn
actor_type: mpnn
critic_type: mlp

# ---- 实验元信息 ----
exp_name: mappo-masupgnn-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
# T=50: grid 图直径≈10, 边权均值≈2.2, 估计 T = 直径×均值 = 22（取 50 留余量）
# deltaT=0.5：与 masup grid 一致
env:
  graph_path: graphs/grid.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.5
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  custom_configs:
    T: 50.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05
    node_feat_dim: 2
    edge_feat_dim: 1
    global_feat_dim: 2

# ---- 算法 ----
algo:
  use_active_mask: true
  actor_lr: 3.0e-5
  critic_lr: 3.0e-4
  gamma: 0.98
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.05
  use_lr_scheduler: true
  actor_lr_start_factor: 1.0
  actor_lr_end_factor: 0.1
  actor_lr_decay_ratio: 0.8
  critic_lr_start_factor: 1.0
  critic_lr_end_factor: 0.1
  critic_lr_decay_ratio: 0.8

# ---- 训练 ----
training:
  num_envs: 12
  use_subproc: true
  num_steps: 512
  total_steps: 20000000
  save_interval: 500
  minibatch_size: 2048
  update_epochs: 5
  eval_interval: 10

# ---- 网络 ----
# grid: 50 节点，均匀连接，gnn_layers=2 覆盖 2 跳邻域（约 7^2=49 节点，基本全图）
actor:
  graph_path: graphs/grid.json
  agent_num: 6
  role_imformation: decision
  hidden_dim: 64
  gnn_layers: 2
  actor_mlp_layers: 1
  gnn_mlp_layers: 2
  mlp_activation: relu
  node_feat_dim: 2
  edge_feat_dim: 1
  global_feat_dim: 2

critic:
  hidden: [256, 256]
