# MAPPO + MASUPGraphEnv (masup_gnn) + MPNN Actor + MLP Critic
# 用法: python train.py configs/experiments/mappo_masupgnn_tsp12_imi.yaml

# ---- 分发字段 ----
algo_name: mappo
env_type: masup_gnn
actor_type: mpnn
critic_type: mlp

# ---- 实验元信息 ----
exp_name: mappo-masupgnn-imi
graph_name: TSP12
track_wandb: true
wandb_project: MAP-RL
seed: 42
actor_path:
critic_path:

# ---- 环境 ----
env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: true
  deltaT: 0.333
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 300
  custom_configs:
    T: 20.0
    role_imformation: agent-index
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05
    node_feat_dim: 2
    edge_feat_dim: 1
    global_feat_dim: 2

# ---- 算法 (自动映射到 MAPPOParams) ----
algo:
  use_active_mask: true
  actor_lr: 3.0e-5
  critic_lr: 3.0e-4
  gamma: 0.999
  gae_lambda: 1.0
  clip_range: 0.2
  vf_coef: 1.0
  ent_coef: 0.1
  clip_vloss: true
  use_lr_scheduler: true
  actor_lr_start_factor: 1.0
  actor_lr_end_factor: 0.1
  actor_lr_decay_ratio: 0.8
  critic_lr_start_factor: 1.0
  critic_lr_end_factor: 0.1
  critic_lr_decay_ratio: 0.8

# ---- 训练 (自动映射到 OnPolicyTrainerConfig) ----
training:
  num_envs: 4
  use_subproc: true
  num_steps: 1024
  total_steps: 50000000
  save_interval: 100
  minibatch_size: 4096
  update_epochs: 10
  eval_interval: 10

# ---- 网络 ----
actor:
  graph_path: graphs/simple_TSP_12.json
  agent_num: 3
  role_imformation: agent-index
  hidden_dim: 64
  gnn_layers: 2
  actor_mlp_layers: 1
  gnn_mlp_layers: 2
  node_feat_dim: 2   # 须与 env.custom_configs.node_feat_dim 一致
  edge_feat_dim: 1   # 须与 env.custom_configs.edge_feat_dim 一致
  global_feat_dim: 2 # 须与 env.custom_configs.global_feat_dim 一致

critic:
  hidden: [256, 256]
