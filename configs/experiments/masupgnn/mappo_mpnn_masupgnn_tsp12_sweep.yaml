# MAPPO + MPNN Actor + MASUPGraphEnv (masup_gnn)
#   python sweep.py \
#     --base-config configs/experiments/masupgnn/mappo_mpnn_masupgnn_tsp12_sweep.yaml \
#     --sweep-config configs/sweep/masupgnn/mappo_mpnn_masupgnn.yaml \
#     --eval-config configs/eval/masupgnn/masup_gnn_tsp12.yaml \
#     --count 40
#   python sweep.py \
#     --base-config configs/experiments/masupgnn/mappo_mpnn_masupgnn_tsp12_sweep.yaml \
#     --sweep-config configs/sweep/masupgnn/mappo_mpnn_masupgnn.yaml \
#     --create-only
#   python sweep.py \
#     --base-config configs/experiments/masupgnn/mappo_mpnn_masupgnn_tsp12_sweep.yaml \
#     --sweep-id <ID> --count 15 \
#     --eval-config configs/eval/masupgnn/masup_gnn_tsp12.yaml --top-n 5
algo_name: mappo
env_type: masup_gnn
actor_type: mpnn
critic_type: mlp

exp_name: mappo-mpnn-masupgnn-sweep
graph_name: TSP12
track_wandb: true
wandb_project: MAP-RL
seed: 42

actor_path: models/masup-gnn-imitation/imi_masup_gnn_tsp12__1773573425_final/policy.pt
critic_path: models/masup-gnn-imitation/imi_masup_gnn_tsp12__1773573425_final/critic.pt

env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: true
  norm_reward: true
  deltaT: 0.333
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 300
  custom_configs:
    T: 20.0
    role_imformation: decision
    reward_scale: 0.01
    truncate_by_time: true
    idi_scale: 0.05
    contribution_scale: 0.05
    node_feat_dim: 2
    edge_feat_dim: 1
    global_feat_dim: 2

algo:
  use_active_mask: true
  actor_lr: 3.0e-5
  critic_lr: 1.0e-4
  gamma: 0.999
  gae_lambda: 1.0
  clip_range: 0.1
  vf_coef: 1.0
  ent_coef: 0.01
  clip_vloss: true
  use_lr_scheduler: true
  actor_lr_start_factor: 1.0
  actor_lr_end_factor: 0.1
  actor_lr_decay_ratio: 0.8
  critic_lr_start_factor: 1.0
  critic_lr_end_factor: 0.1
  critic_lr_decay_ratio: 0.8

training:
  num_envs: 12
  use_subproc: true
  num_steps: 2048
  total_steps: 50000000
  save_interval: 760
  minibatch_size: 4096
  update_epochs: 5
  eval_interval: 10

actor:
  graph_path: graphs/simple_TSP_12.json
  agent_num: 3
  role_imformation: decision
  hidden_dim: 128
  gnn_layers: 3
  actor_mlp_layers: 2
  gnn_mlp_layers: 2
  mlp_activation: relu
  node_feat_dim: 2
  edge_feat_dim: 1
  global_feat_dim: 2

critic:
  hidden: [512, 256, 128]
