# Q-table + NEP 环境 (LongEdge) — 3 agents（与图一致）
# episode_len=100 与 DRL 对齐；NEP 为事件驱动，trainer episode 轮次通常多于 FixedStep，decay 更慢
# 用法: python train.py configs/experiments/nep/qtable_nep_longedge.yaml

algo_name: qtable
env_type: nep

exp_name: qtable-nep-longedge
graph_name: long_edge
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/long_edge.json
  enable_wait: false
  num_agents: 3
  init_positions: [0, 1, 2]
  episode_len: 100

algo:
  lr: 0.9
  gamma: 0.9
  epsilon_start: 0.2
  epsilon_end: 0.1
  epsilon_decay: 0.99999

training:
  num_envs: 4
  use_subproc: false
  total_steps: 10000000
  save_interval: 1000
