# QTable + NEPEnv @ mapA
algo_name: qtable
env_type: nep
exp_name: qtable-nep-mapA
graph_name: mapA
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/mapA.json
  enable_wait: false
  norm_reward: true
  norm_obs: false
  num_agents: 6
  init_positions: [0, 10, 20, 30, 40, 49]
  episode_len: 500
  custom_configs:
    truncate_by_time: true

algo:
  lr: 0.001
  gamma: 0.999
  epsilon_start: 0.2
  epsilon_end: 0.05
  sync_update: true
  epsilon_decay_steps: 10000000

training:
  num_envs: 36
  use_subproc: true
  total_steps: 50000000
  save_interval: 300
  eval_interval: 10

eval_config_path: configs/eval/nep/nep_mapA.yaml
