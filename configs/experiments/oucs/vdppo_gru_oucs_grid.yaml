algo_name: vdppo
env_type: oucs
actor_type: rnn
q_type: rnn

exp_name: vdppo-gru-oucs
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  norm_obs: true
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

algo:
  use_active_mask: true
  actor_lr: 0.0007060824869158372
  q_lr: 0.0022915285417258917
  gamma: 0.99
  gae_lambda: 0.948439624611504
  clip_range: 0.20349696839742087
  vf_coef: 0.9647832089675668
  ent_coef: 0.003423819781228686
  target_kl: 0.3
  tau: 0.46177941976361936
  target_update_freq: 5
  q_clip_range: null
  mixer_embed_dim: 128
  data_chunk_length: 10
  reward_global: false

training:
  num_envs: 96
  use_subproc: true
  num_steps: 512
  total_steps: 50000000
  save_interval: 300
  minibatch_size: 2048
  update_epochs: 10
  eval_interval: 10

actor:
  rnn_type: gru
  hidden_size: 256
  num_layers: 1
  fc_hidden: [256, 256]

q_network:
  rnn_type: gru
  hidden_size: 256
  num_layers: 1
  dueling: false
