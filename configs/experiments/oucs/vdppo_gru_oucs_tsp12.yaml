# VDPPO + GRU Actor + OUCSEnv (TSP12) — 3 agents
# 用法: python train.py configs/experiments/vdppo_gru_oucs_tsp12.yaml

# ---- 分发字段 ----
algo_name: vdppo
env_type: oucs
actor_type: rnn
q_type: rnn

# ---- 实验元信息 ----
exp_name: vdppo-gru-oucs
graph_name: TSP12
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
env:
  graph_path: graphs/simple_TSP_12.json
  enable_wait: false
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 300
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

# ---- 算法 ----
algo:
  use_active_mask: true
  actor_lr: 0.0005
  q_lr: 0.0005
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  target_kl: 0.3
  tau: 0.1
  target_update_freq: 1
  q_clip_range: null
  mixer_embed_dim: 64
  data_chunk_length: 10
  reward_global: false

# ---- 训练 ----
training:
  num_envs: 12
  use_subproc: true
  num_steps: 2048
  total_steps: 50000000
  save_interval: 800
  minibatch_size: 4096
  update_epochs: 5

# ---- 网络 ----
actor:
  rnn_type: gru
  hidden_size: 64
  num_layers: 1
  fc_hidden: [256, 256]   # GRU 前编码层

q_network:
  rnn_type: gru
  hidden_size: 64
  num_layers: 1
  dueling: true
