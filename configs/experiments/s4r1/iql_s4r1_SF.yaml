# IQL + MLP + S4R1Env (SF / SFcrimemap)
algo_name: iql
env_type: s4r1
q_type: mlp

exp_name: iql-s4r1
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: false
  norm_reward: true
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  norm_obs: true
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

algo:
  sync_replay: true
  lr: 0.0005
  gamma: 0.95
  tau: 0.001
  target_update_freq: 1
  epsilon_start: 0.95
  epsilon_end: 0.005
  epsilon_decay_steps: 10000000
  use_double_dqn: true
  shared_policy: false

training:
  num_envs: 108
  use_subproc: true
  num_steps: 4096
  total_steps: 10000000
  save_interval: 500
  batch_size: 128
  warmup_steps: 20000
  buffer_size: 150000
  collect_per_step: 108
  update_per_step: 1
  eval_interval: 25

# ---- Q-network ----
q_network:
  hidden: [256, 256]
  dueling: true
