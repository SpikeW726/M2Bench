# IQL + MLP + S4R1Env (SF / SFcrimemap)
# 用法: python train.py configs/experiments/s4r1/iql_s4r1_SF.yaml
# Sweep: 与通用 configs/sweep/s4r1/iql_mlp_s4r1.yaml 共用（其中不含 num_envs，本文件 num_envs: 4 不会被覆盖）

# ---- 分发字段 ----
algo_name: iql
env_type: s4r1
q_type: mlp

# ---- 实验元信息 ----
exp_name: iql-s4r1
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境（与 masup_SF eval 中 num_agents / init_positions / episode_len 对齐）----
env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: false
  num_agents: 3
  init_positions: [0, 5, 11]
  episode_len: 3000
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

# ---- 算法 ----
# SF 大图 + 按时间截断：探索衰减略放慢，避免 Q 未熟时过早贪心
algo:
  sync_replay: true
  lr: 0.0005
  gamma: 0.95
  tau: 0.001
  target_update_freq: 1
  epsilon_start: 0.95
  epsilon_end: 0.005
  epsilon_decay_steps: 34978
  use_double_dqn: true
  shared_policy: false

# ---- 训练 ----
# num_envs=4 为 sweep 约束；增大 num_steps / collect_per_step 提高每轮完结 episode 数，减轻 rollout/episode_reward 长期 N/A
training:
  num_envs: 4
  use_subproc: true
  num_steps: 4096
  total_steps: 10000000
  save_interval: 500
  batch_size: 128
  warmup_steps: 20000
  buffer_size: 150000
  collect_per_step: 64
  update_per_step: 1

# ---- Q-network ----
q_network:
  hidden: [128, 84]
  dueling: true
