# IQL + MLP Q-network + S4R1Env (TSP12) — 3 agents
# 用法: python train.py configs/experiments/iql_s4r1_tsp12.yaml

# ---- 分发字段 ----
algo_name: iql
env_type: s4r1
q_type: mlp

# ---- 实验元信息 ----
exp_name: iql-s4r1
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

# ---- 环境 ----
env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  num_agents: 6
  init_positions: [1, 9, 17, 25, 33, 41]
  episode_len: 500
  norm_obs: true
  custom_configs:
    truncate_by_time: true
    penalised_factor: 1.5

# ---- 算法 ----
algo:
  sync_replay: true    # 启用经验回放同步
  lr: 0.00006639393643168706
  gamma: 0.995
  tau: 0.008900599806500872
  target_update_freq: 5
  epsilon_start: 1
  epsilon_end: 0.05
  epsilon_decay_steps: 5000000
  use_double_dqn: true
  shared_policy: false
  max_grad_norm: 10

# ---- 训练 ----
training:
  num_envs: 48
  use_subproc: true
  num_steps: 512
  total_steps: 50000000
  save_interval: 500
  batch_size: 256
  warmup_steps: 5000
  buffer_size: 50000
  collect_per_step: 48
  update_per_step: 5
  eval_interval: 5

# ---- Q-network ----
q_network:
  hidden: [256, 256]
  dueling: true
