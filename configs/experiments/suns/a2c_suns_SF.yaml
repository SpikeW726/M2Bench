algo_name: a2c
env_type: suns_gym
actor_type: sun
critic_type: sun

exp_name: a2c-suns-SF
graph_name: SF
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/SFcrimemap.json
  enable_wait: false
  norm_reward: true
  num_agents: 1
  init_positions: [0]
  episode_len: 3000
  norm_obs: true
  custom_configs:
    truncate_by_time: true

algo:
  lr: 0.000168888839673364
  gamma: 0.999
  gae_lambda: 0.9081211421614606
  vf_coef: 0.5
  ent_coef: 0.009031146681261244
  use_value_norm: true
  max_grad_norm: 0.5

# max_iterations = ceil(10M / 12288) = 814
training:
  num_envs: 108
  use_subproc: true
  num_steps: 4096
  total_steps: 40000000
  save_interval: 1000
  minibatch_size: 1024
  update_epochs: 1
  eval_interval: 1

actor:
  num_nodes: 12
  node_feat_dim: 2
  f1_hidden: 4
  f2_hidden: 6
critic:
  num_nodes: 12
  node_feat_dim: 2
  f1_hidden: 4
  f2_hidden: 6
