algo_name: a2c
env_type: suns_gym
actor_type: sun
critic_type: sun

exp_name: a2c-suns-grid
graph_name: grid
track_wandb: true
wandb_project: MAP-RL
seed: 42

env:
  graph_path: graphs/grid.json
  enable_wait: false
  norm_reward: true
  num_agents: 1
  init_positions: [1]
  episode_len: 500
  norm_obs: true
  custom_configs:
    truncate_by_time: true

algo:
  lr: 7.0e-4
  gamma: 0.98
  gae_lambda: 0.95
  vf_coef: 0.5
  ent_coef: 0.01

# max_iterations = ceil(20M / 12288) = 1628
training:
  num_envs: 48
  use_subproc: true
  num_steps: 1024
  total_steps: 50000000
  save_interval: 500
  minibatch_size: 2048
  update_epochs: 1
  eval_interval: 10

actor:
  num_nodes: 50
  node_feat_dim: 2
  f1_hidden: 4
  f2_hidden: 6
critic:
  num_nodes: 50
  node_feat_dim: 2
  f1_hidden: 4
  f2_hidden: 6
