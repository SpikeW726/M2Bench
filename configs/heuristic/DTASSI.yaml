env:
  graph_path: graphs/island.json
  num_agents: 6
  init_positions: [0, 10, 20, 30, 40, 49]
  episode_len: 500

eval:
  num_episodes: 10
  save_plot: evaluators/results/island/dta_ssi/DTASSI_eval.png
  show_plot: false
  animation: false
  event_driven: true
  max_frames: 1500

algorithm_params:
  tabu_length: 5
  # 与旧版一致：在基础分上再乘每候选独立 Uniform(低, 高)，与 Greedy 的 stochastic/score_jitter 独立
  ssi_uniform_low: 0.9
  ssi_uniform_high: 1.1
