env:
  graph_path: graphs/island.json
  num_agents: 6
  init_positions: [0, 10, 20, 30, 40, 49]
  episode_len: 500

eval:
  num_episodes: 10
  save_plot: evaluators/results/island/hpcc/HPCC_eval.png
  show_plot: false
  animation: false
  event_driven: true
  max_frames: 1500

algorithm_params:
  distance_mode: sp
  w_idl: 0.6
  w_dist: 0.25
  w_conflict: 0.5
  softmax_tau: 1.0
