# masup (MAPPO, MLP) SF 图模仿学习配置
#
# 模仿训练阶段用法:
#   python trainers/imitator/imitation_trainer.py --config configs/imitator/mappo_masup_SF.yaml

# ----- 算法（决定预训练模式：actor_critic / actor_only / q_net）-----
algo_name: mappo

# ----- 环境配置（用于自动推断 obs_dim / action_dim / state_dim / num_agents）-----
env_type: masup
env_config: configs/eval/masup/masup_SF.yaml
# 维度由环境接口自动推断，无需手动填写

# ----- 网络结构参数 -----
actor_type: mlp

actor:
  hidden: [256, 256]

critic_hidden_sizes: [256, 256]

# ----- 训练超参 -----
actor_lr: 3.0e-4
critic_lr: 3.0e-4
batch_size: 1024
iteration: 100
actor_patience: 5
actor_min_delta: 1.0e-5
use_value_norm: true

# ----- 数据 & 日志 -----
data_path: ~/autodl-tmp/dataset/SF/mappo_masup.h5
save_dir: ~/autodl-tmp/models/imi-mappo-masup-SF
exp_name: imi_mappo_masup_mlp_SF
track: false
wandb_project: MAP-imitation
