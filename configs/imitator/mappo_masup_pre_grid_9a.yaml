# MAPPO + MASUPActorMLP/MASUPCriticMLP — grid 图模仿学习预训练（异构预处理 masup_mlp）
#
# 用法:
#   python trainers/imitator/imitation_trainer.py \
#       --config configs/imitator/mappo_masup_pre_grid.yaml
#   python trainers/imitator/imitation_trainer.py \
#       --config configs/imitator/mappo_masup_pre_grid.yaml \
#       --data_path ~/autodl-tmp/dataset/grid/mappo_masup.h5
#
# 预训练模式: actor_critic
#   - Actor  (masup_mlp): BC cross-entropy loss on expert actions
#   - Critic (masup_mlp): MSE(V, returns)，输入为 state() + agent_one_hot
#
# 预训练完成后，将生成的 policy.pt / critic.pt 填入 RL 实验 YAML 的
# actor_path / critic_path（如 mappo_masup_grid 系列 sweep / imi）

# ----- 算法（决定预训练模式：actor_critic）-----
algo_name: mappo

# ----- 环境（用于自动推断 obs_dim / action_dim / state_dim / num_agents）-----
env_type: masup
env_config: configs/eval/masup/masup_grid_a9.yaml

# ----- 网络结构（须与目标 RL 实验 YAML 中 actor/critic 段一致，如 mappo_masup_grid.yaml）-----
actor_type: masup_mlp
critic_type: masup_mlp

actor:
  graph_path: graphs/grid.json
  num_agents: 9
  num_nodes: 50
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 50.0
  hidden: [256, 512]

critic:
  graph_path: graphs/grid.json
  num_agents: 9
  num_nodes: 50
  role_imformation: decision
  gpe_dim: 8
  proj_dim: 16
  use_log_idleness: false
  T_time: 50.0
  input_mode: state       # MAPPO Critic：输入 state() + agent_one_hot
  hidden: [256, 512]

# ----- 训练超参 -----
actor_lr: 3.0e-4
critic_lr: 3.0e-4
batch_size: 1024
iteration: 50
actor_patience: 5
actor_min_delta: 1.0e-5
use_value_norm: true

# ----- 数据 & 日志 -----
data_path: /root/autodl-tmp/dataset/grid/dtassi_9a_samples.h5
save_dir: /root/autodl-tmp/models/imi-mappo-pre-masup-grid-9a
exp_name: imi_pre_masup_mlp_mappo_grid_9a
track: false
wandb_project: MAP-imitation
