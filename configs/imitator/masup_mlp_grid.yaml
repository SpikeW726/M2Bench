# masup (MLP) Grid 图模仿学习配置
#
# 模仿训练阶段用法:
#   python trainers/imitator/imitation_trainer.py --config configs/imitator/masup_mlp_grid.yaml
#   python trainers/imitator/imitation_trainer.py --config configs/imitator/masup_mlp_grid.yaml --data_path dataset/grid/samples.h5

# ----- 算法（决定预训练模式：actor_critic / actor_only / q_net）-----
algo_name: mappo

# ----- 环境配置（用于自动推断 obs_dim / action_dim / state_dim / num_agents）-----
env_type: masup
env_config: configs/eval/masup/masup_grid.yaml
# 维度由环境接口自动推断，无需手动填写

actor_type: mlp

# ActorMLP 配置
actor:
  hidden: [512, 256, 128]

# CriticMLP 配置
critic_hidden_sizes: [512, 256, 128]

actor_lr: 3.0e-4
critic_lr: 3.0e-4
batch_size: 1024
iteration: 100
actor_patience: 5
actor_min_delta: 1.0e-5
use_value_norm: true

data_path: dataset/grid/samples_pure_0.01reward_random.h5
save_dir: models/masup-mlp-imitation
exp_name: imi_masup_mlp_grid
track: false
wandb_project: MAP-imitation
