# masup (IQL, MLP Q-network) 模仿学习配置
#
# 模仿训练阶段用法:
#   python trainers/imitator/imitation_trainer.py --config configs/imitator/masup_mlp_iql.yaml
#
# 预训练模式: q_net
#   - Q-network 联合 BC + Value 损失预训练：
#       BC loss:    cross-entropy(Q_logits, expert_action)  → 让专家动作 Q 值排名最高
#       Value loss: MSE(Q[expert_action], returns)          → 让专家动作 Q 值量级正确
#   - 输入: obs（IQL MLP Q-network 输入维度）
#   - Mixer 不适用（IQL 无 Mixer），无需额外预训练
#
# 用法说明:
#   预训练完成后，在 IQL 实验 YAML 中设置 actor_path 指向 _final/policy.pt，
#   train.py off-policy 分支自动将权重加载到 q_net（复用 actor_path 字段）。

# ----- 算法（决定预训练模式：actor_critic / actor_only / q_net）-----
algo_name: iql

# ----- 环境配置（用于自动推断 obs_dim / action_dim / state_dim / num_agents）-----
env_type: masup
env_config: configs/eval/masup/masup_grid.yaml

# ----- 网络结构参数 -----
q_type: mlp

# QMLP 配置
q_network:
  hidden: [256, 256]
  dueling: false

# ----- 训练超参 -----
actor_lr: 3.0e-4    # q_lr 使用 actor_lr 字段（兼容）
bc_lambda: 1.0      # BC loss 权重
value_lambda: 0.5   # Value loss 权重
batch_size: 1024
iteration: 100
use_value_norm: true

# ----- 数据 & 日志 -----
data_path: dataset/grid/samples_pure_0.01reward_random.h5
save_dir: models/masup-mlp-iql-imitation
exp_name: imi_masup_mlp_iql
track: false
wandb_project: MAP-imitation
