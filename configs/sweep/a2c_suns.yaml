# A2C + SUNSGymEnv (TSP12) 超参数搜索
# 用法:
#   python sweep.py --base-config configs/experiments/a2c_suns_tsp12.yaml \
#                   --sweep-config configs/sweep/a2c_suns.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/a2c_suns_tsp12.yaml \
#                   --sweep-config configs/sweep/a2c_suns.yaml --create-only
#   python sweep.py --base-config configs/experiments/a2c_suns_tsp12.yaml \
#                   --sweep-id <ID> --count 15   # 各 tmux 窗口

method: bayes

metric:
  name: env/wi
  goal: minimize

early_terminate:
  type: median_stopping_rule
  min_iter: 200
  min_samples_to_check: 6

parameters:
  # ---- A2CParams (单优化器) ----
  lr:
    min: 0.00001
    max: 0.001
    distribution: log_uniform_values

  # ---- OnPolicyParams ----
  gamma:
    values: [0.99, 0.995, 0.999]

  gae_lambda:
    min: 0.9
    max: 1.0

  max_grad_norm:
    values: [0.5, 1.0, 5.0]

  # ---- OnPolicyTrainerConfig ----
  num_steps:
    values: [512, 1024, 2048]

  minibatch_size:
    values: [1024, 2048, 4096]

  update_epochs:
    value: 1

  max_iterations:
    value: 1000

  save_interval:
    value: 1000
