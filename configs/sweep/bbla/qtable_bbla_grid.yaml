# QTable + BBLAEnv (grid) 超参数搜索
# 用法:
#   python sweep.py --base-config configs/experiments/bbla/qtable_bbla_grid.yaml \
#                   --sweep-config configs/sweep/bbla/qtable_bbla_grid.yaml \
#                   --eval-config configs/eval/bbla/bbla_grid.yaml --count 20
#
# grid 图: 50 节点，max_degree=7，均匀边权（均值≈2.2），FixedStepEnv
# 状态空间远小于 SF（全连通），epsilon 可较快衰减

method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 4
  min_steps: 10000000
  terminate_ratio: 0.5
  early_stop_iters: 200
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  lr:
    min: 0.00001
    max: 0.001
    distribution: log_uniform_values

  gamma:
    values: [0.99, 0.999]
  epsilon_start:
    values: [0.2, 0.5, 1.0]
  epsilon_end:
    value: 0.05
  save_interval:
    value: 1000
  # grid max_degree=7，状态空间较 SF 小，衰减步数减少
  epsilon_decay_steps:
    min: 8000000
    max: 12000000
    distribution: uniform
