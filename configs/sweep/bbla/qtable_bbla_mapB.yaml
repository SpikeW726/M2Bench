method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 4
  min_steps: 15000000
  terminate_ratio: 0.5
  early_stop_iters: 200
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
  state_file: .sweep_es_qtable_bbla_mapB.json

parameters:
  seed:
    value: 42
  total_steps:
    value: 50000000
  lr:
    min: 1.0e-5
    max: 1.0e-2
    distribution: log_uniform_values
  gamma:
    values: [0.995, 0.999]
  epsilon_start:
    values: [0.2, 0.5, 1.0]
  epsilon_end:
    value: 0.05
  save_interval:
    value: 300
  epsilon_decay_steps:
    values: [10000000, 15000000]
