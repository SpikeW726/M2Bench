method: bayes

metric:
  name: eval/igi
  goal: minimize

early_terminate:
  min_trial: 4
  min_steps: 3000000      # 略降低，便于尽早淘汰无希望 trial
  terminate_ratio: 0.5
  early_stop_iters: 6
  slope_horizons: [4, 8, 16]
  slope_threshold: 1.0e-4
  state_file: .sweep_es_happo_beau_chain10.json

parameters:
  seed:
    value: 42
  total_steps:
    value: 20000000
  lr:
    min: 3.0e-5           # 收敛导向：避免过小 lr 拖慢学习
    max: 3.0e-4
    distribution: log_uniform_values
  gamma:
    values: [0.97, 0.99, 0.995]   # chain10 短 horizon，覆盖偏低 gamma
  clip_coef:
    min: 0.1
    max: 0.25
  ent_coef:
    min: 0.005            # 收窄范围，减少后期过度探索
    max: 0.05
  policy_update_steps:
    values: [4, 5, 6]
  hidden_dim:
    values: [64, 96]
  num_heads:
    values: [4, 8]
  encoder_layers:
    values: [1, 2]
  custom_configs.reward_scale:
    values: [0.02, 0.05, 0.1]
  num_steps:
    values: [96, 128, 192, 256]   # 偏小 rollout，搜索高频 update 区间
  update_epochs:
    values: [10, 12, 15]          # 提高每批数据的 GPU 学习次数
  minibatch_size:
    values: [64, 128]
  num_envs:
    value: 1
  save_interval:
    value: 500
  eval_interval:
    value: 20
  eval_episodes:
    value: 3
