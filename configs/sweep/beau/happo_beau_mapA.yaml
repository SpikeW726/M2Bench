method: bayes

metric:
  name: eval/igi
  goal: minimize

early_terminate:
  min_trial: 4
  min_steps: 6000000
  terminate_ratio: 0.45
  early_stop_iters: 10
  slope_horizons: [4, 8, 16]
  slope_threshold: 1.0e-4
  state_file: .sweep_es_happo_beau_mapA.json

parameters:
  seed:
    value: 42
  total_steps:
    value: 40000000
  lr:
    min: 1.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  gamma:
    values: [0.97, 0.99, 0.995]
  clip_coef:
    min: 0.1
    max: 0.25
  ent_coef:
    min: 0.0
    max: 0.04
  policy_update_steps:
    values: [4, 6, 8]
  hidden_dim:
    values: [64, 128]
  num_heads:
    values: [4, 8]
  encoder_layers:
    values: [2, 3]
  custom_configs.reward_scale:
    values: [0.005, 0.01, 0.015]
  num_steps:
    values: [600, 800, 1024]
  num_envs:
    value: 1
  save_interval:
    value: 1000
  eval_interval:
    value: 12
  eval_episodes:
    value: 3
