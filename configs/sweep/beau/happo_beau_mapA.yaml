# WandB sweep：happo + BEAU @ grid（6 agents）
# 建议:  --eval-config configs/eval/beau/beau_grid.yaml

method: bayes

metric:
  name: eval/wi
  goal: minimize

parameters:
  seed:
    value: 42
  lr:
    min: 1.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  gamma:
    values: [0.97, 0.99, 0.995]
  clip_coef:
    min: 0.1
    max: 0.25
  ent_coef:
    min: 0.0
    max: 0.04
  policy_update_steps:
    values: [4, 6]
  hidden_dim:
    value: 128
  num_heads:
    value: 4
  encoder_layers:
    value: 3
  custom_configs.reward_scale:
    values: [0.005, 0.01, 0.015]
  num_steps:
    value: 512
  num_envs:
    value: 1
  total_steps:
    value: 3000000
  save_interval:
    value: 10000
  eval_interval:
    value: 1000
  eval_episodes:
    value: 1

early_terminate:
  min_trial: 2
  min_steps: 1000000
  terminate_ratio: 0.5
  early_stop_iters: 10
  slope_horizons: [4, 8, 16]
  slope_threshold: 1.0e-4
  state_file: .sweep_es_happo_beau_mapA.json
