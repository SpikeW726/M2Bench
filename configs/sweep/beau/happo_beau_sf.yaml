method: bayes

metric:
  name: eval/igi
  goal: minimize

parameters:
  seed:
    value: 42
  lr:
    min: 1.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  gamma:
    values: [0.99, 0.995, 0.999]
  clip_coef:
    min: 0.1
    max: 0.3
  ent_coef:
    min: 0.0
    max: 0.05
  policy_update_steps:
    values: [3, 5, 8]
  hidden_dim:
    values: [64, 96, 128]
  num_heads:
    values: [4, 8]
  encoder_layers:
    values: [2, 3]
  custom_configs.reward_scale:
    values: [0.005, 0.01, 0.02]
  num_steps:
    values: [512, 800, 1024]
  num_envs:
    value: 1
  total_steps:
    value: 20000000
  save_interval:
    value: 2000
  eval_interval:
    value: 15
  eval_episodes:
    value: 3

early_terminate:
  min_trial: 4
  min_steps: 8000000
  terminate_ratio: 0.5
  early_stop_iters: 10
  slope_horizons: [3, 6, 12]
  slope_threshold: 5.0e-5
  state_file: .sweep_es_happo_beau_sf.json
