method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 3000000
  terminate_ratio: 0.4
  early_stop_iters: 80
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
  state_file: .sweep_es_qtable_exgbla_chain10.json

parameters:
  seed:
    value: 42
  total_steps:
    value: 20000000
  lr:
    min: 1.0e-5
    max: 1.0e-2
    distribution: log_uniform_values
  gamma:
    values: [0.95, 0.99]
  epsilon_start:
    values: [0.2, 0.5, 1.0]
  epsilon_end:
    value: 0.05
  save_interval:
    value: 150
  epsilon_decay_steps:
    min: 2000000
    max: 6000000
    distribution: uniform
