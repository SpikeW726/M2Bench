# QTable + ExGBLAEnv (grid) 超参数搜索
# 用法:
#   python sweep.py --base-config configs/experiments/exgbla/qtable_exgbla_grid.yaml \
#                   --sweep-config configs/sweep/exgbla/qtable_exgbla_grid.yaml \
#                   --eval-config configs/eval/exgbla/exgbla_grid.yaml --count 20
#
# grid 图: 50 节点，max_degree=7，obs_dim=16（GBLA + 邻居精确位置）
# 状态空间介于 GBLA 与 SF ExGBLA 之间

method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 4
  min_steps: 5000000
  terminate_ratio: 0.5
  early_stop_iters: 8
  slope_horizons: [4, 8]
  slope_threshold: 5.0e-5

parameters:
  seed:
    value: 42
  lr:
    min: 0.01
    max: 0.9
    distribution: log_uniform_values
  gamma:
    values: [0.9, 0.95, 0.97, 0.99]
  epsilon_start:
    values: [0.05, 0.1, 0.2, 0.5]
  epsilon_end:
    min: 0.01
    max: 0.1
    distribution: uniform
  save_interval:
    value: 1000
  # grid obs_dim=16（扩展邻居位置），状态空间较大，decay 进一步延长
  epsilon_decay_steps:
    min: 10000
    max: 1000000
    distribution: uniform
