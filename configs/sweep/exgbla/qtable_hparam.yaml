method: bayes
metric:
  name: eval/wi
  goal: minimize

parameters:
  seed:
    value: 42
  lr:
    min: 0.00001
    max: 0.01
    distribution: log_uniform_values
  gamma:
    value: 0.999
  epsilon_start:
    values:
    - 0.2
    - 0.5
    - 1.0
  epsilon_end:
    value: 0.05
  save_interval:
    value: 1000
  epsilon_decay_steps:
    min: 8000000
    max: 15000000
    distribution: uniform

  # ---- 自定义早停 ----
early_terminate:
  min_trial: 4              # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 10000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.5      # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 200     # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5