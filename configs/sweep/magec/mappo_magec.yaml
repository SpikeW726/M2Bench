# MAPPO + MAGECEnv 超参数搜索
# 用法:
#   python sweep.py --base-config configs/experiments/magec/mappo_magec_longedge.yaml \
#                   --sweep-config configs/sweep/magec/mappo_magec.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/magec/mappo_magec_longedge.yaml \
#                   --sweep-config configs/sweep/magec/mappo_magec.yaml --create-only
#   python sweep.py --base-config configs/experiments/magec/mappo_magec_longedge.yaml \
#                   --sweep-id <ID> --count 15

method: bayes

metric:
  name: env/wi
  goal: minimize

early_terminate:
  type: hyperband
  min_iter: 1000
  eta: 3

parameters:
  # ---- MAPPOParams: 优化器 ----
  actor_lr:
    min: 5.0e-5
    max: 1.0e-3
    distribution: log_uniform_values

  critic_lr:
    min: 1.0e-4
    max: 3.0e-3
    distribution: log_uniform_values

  # ---- MAPPOParams: PPO ----
  clip_range:
    min: 0.1
    max: 0.4

  vf_coef:
    min: 0.1
    max: 2.0

  ent_coef:
    min: 0.001
    max: 0.1
    distribution: log_uniform_values

  gae_lambda:
    min: 0.9
    max: 1.0

  gamma:
    values: [0.99, 0.995, 0.999]

  # ---- OnPolicyTrainerConfig ----
  num_steps:
    values: [256, 512, 1024]

  minibatch_size:
    values: [512, 1024, 2048]

  update_epochs:
    values: [3, 5, 10]

  total_steps:
    value: 10000000

  save_interval:
    value: 200
