#   python sweep.py --base-config configs/experiments/magec/mappo_magec_longedge.yaml \
#                   --sweep-config configs/sweep/magec/mappo_magec.yaml --count 40
#   python sweep.py --base-config configs/experiments/magec/mappo_magec_SF.yaml \
#                   --sweep-config configs/sweep/magec/mappo_magec.yaml --count 40
#   python sweep.py --base-config configs/experiments/magec/mappo_magec_SF.yaml \
#                   --sweep-config configs/sweep/magec/mappo_magec.yaml --create-only
#   python sweep.py --base-config configs/experiments/magec/mappo_magec_SF.yaml \
#                   --sweep-id <ID> --count 15
method: bayes

metric:
  name: eval/wi
  goal: minimize

parameters:
  seed:
    value: 42
  actor_lr:
    min: 5.0e-6
    max: 1.0e-3
    distribution: log_uniform_values

  critic_lr:
    min: 1.0e-5
    max: 3.0e-3
    distribution: log_uniform_values

  # ---- MAPPOParams: PPO ----
  clip_range:
    min: 0.1
    max: 0.4

  vf_coef:
    min: 0.5
    max: 2.0

  ent_coef:
    min: 0.0
    max: 0.01

  gae_lambda:
    min: 0.9
    max: 1.0

  gamma:
    value: 0.999

  # ---- OnPolicyTrainerConfig ----
  num_steps:
    values: [3072, 4096]

  minibatch_size:
    values: [1024, 2048, 4096]

  update_epochs:
    values: [3, 5]


  save_interval:
    value: 200

early_terminate:
  min_trial: 4
  min_steps: 10000000
  terminate_ratio: 0.5
  early_stop_iters: 200
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
