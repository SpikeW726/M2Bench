method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 3000000
  terminate_ratio: 0.4
  early_stop_iters: 50
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
  state_file: .sweep_es_mappo_magec_chain10.json

parameters:
  seed:
    value: 42
  total_steps:
    value: 20000000
  actor_lr:
    min: 5.0e-5
    max: 1.0e-3
    distribution: log_uniform_values
  critic_lr:
    min: 1.0e-4
    max: 3.0e-3
    distribution: log_uniform_values
  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.1
    max: 0.5
  ent_coef:
    min: 0.001
    max: 0.1
    distribution: log_uniform_values
  gae_lambda:
    values: [0.95, 0.99, 0.999]
  gamma:
    values: [0.95, 0.99, 0.995]
  use_value_norm:
    value: true
  num_steps:
    values: [512, 1024]
  minibatch_size:
    values: [256, 512, 1024]
  update_epochs:
    values: [3, 5]
  save_interval:
    value: 100
