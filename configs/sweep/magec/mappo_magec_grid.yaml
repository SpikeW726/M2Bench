#   python sweep.py --base-config configs/experiments/magec/mappo_magec_grid.yaml \
#                   --sweep-config configs/sweep/magec/mappo_magec_grid.yaml \
#                   --eval-config configs/eval/magec/magec_grid.yaml --count 40
method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 10000000
  terminate_ratio: 0.4
  early_stop_iters: 100
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  # ---- MAPPOParams ----
  actor_lr:
    min: 5.0e-5
    max: 1.0e-3
    distribution: log_uniform_values

  critic_lr:
    min: 1.0e-4
    max: 3.0e-3
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.4

  vf_coef:
    min: 0.1
    max: 0.5

  ent_coef:
    min: 0.001
    max: 0.1
    distribution: log_uniform_values

  gae_lambda:
    values: [0.95, 0.99, 0.999]

  gamma:
    value: 0.999

  # ---- OnPolicyTrainerConfig ----
  num_steps:
    values: [1024, 2048]
  minibatch_size:
    values: [512, 1024]
  update_epochs:
    values: [3, 5]

  save_interval:
    value: 200
