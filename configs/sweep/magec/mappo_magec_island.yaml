method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 15000000
  terminate_ratio: 0.5
  early_stop_iters: 100
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
  state_file: .sweep_es_mappo_magec_island.json

parameters:
  seed:
    value: 42
  total_steps:
    value: 60000000
  actor_lr:
    min: 5.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  critic_lr:
    min: 1.0e-5
    max: 3.0e-3
    distribution: log_uniform_values
  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.5
    max: 1.0
  ent_coef:
    min: 0.001
    max: 0.15
    distribution: log_uniform_values
  gae_lambda:
    values: [0.99, 0.999]
  gamma:
    values: [0.99, 0.999]
  use_value_norm:
    value: true
  num_steps:
    values: [1024, 2048]
  minibatch_size:
    values: [512, 1024, 2048]
  update_epochs:
    values: [3, 5]
  save_interval:
    value: 200
