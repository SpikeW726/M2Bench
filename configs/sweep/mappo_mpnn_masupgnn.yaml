# MAPPO + MPNN + MASUPGraphEnv (masup_gnn) 超参数搜索
#
# 用法:
#   python sweep.py \
#     --base-config configs/experiments/mappo_mpnn_masupgnn_tsp12_sweep.yaml \
#     --sweep-config configs/sweep/mappo_mpnn_masupgnn.yaml \
#     --count 40
#
# Step 预算说明（固定，不可被 sweep 覆盖）:
#   num_envs=16  ×  num_steps=2048  ×  max_iterations=1526  ≈  50M steps/trial

method: bayes

metric:
  name: env/wi
  goal: minimize

early_terminate:
  type: median_stopping_rule
  min_iter: 700              # 约 46% max_iterations 后才允许早停
  min_samples_to_check: 5   # 至少 5 个 trial 完成才开始比较

parameters:
  # ---- MAPPOParams: 优化器 ----
  actor_lr:
    min: 5.0e-6
    max: 2.0e-4
    distribution: log_uniform_values  # 微调阶段 LR 偏小

  critic_lr:
    min: 3.0e-5
    max: 5.0e-4
    distribution: log_uniform_values

  # ---- MAPPOParams: PPO ----
  clip_range:
    min: 0.05
    max: 0.25                # 预训练初始化时不宜过大

  vf_coef:
    min: 0.3
    max: 2.0

  ent_coef:
    min: 0.001
    max: 0.1
    distribution: log_uniform_values

  gae_lambda:
    min: 0.9
    max: 1.0

  gamma:
    value: 0.999             # 固定，与预训练阶段一致

  # ---- OnPolicyTrainerConfig ----
  minibatch_size:
    values: [2048, 4096, 8192]   # 总数据量 16×2048=32768，minibatch 不超过总量

  update_epochs:
    values: [3, 5, 10]

  # 以下两个固定，确保所有 trial step 预算一致（约 50M）
  num_steps:
    value: 2048

  max_iterations:
    value: 1526

  save_interval:
    value: 760
