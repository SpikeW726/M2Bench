# IPPO + MASUPEnv 超参数搜索
# 用法:
#   python sweep.py --base-config configs/experiments/masup/ippo_masup_longedge.yaml \
#                   --sweep-config configs/sweep/masup/ippo_masup.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/masup/ippo_masup_longedge.yaml \
#                   --sweep-config configs/sweep/masup/ippo_masup.yaml --create-only
#   python sweep.py --base-config configs/experiments/masup/ippo_masup_longedge.yaml \
#                   --sweep-id <ID> --count 15

method: bayes

metric:
  name: env/wi_fromT
  goal: minimize

parameters:
  # ---- algo params (映射到 IPPOParams) ----
  lr:
    min: 0.000001
    max: 0.001
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.1
    max: 2.0
  ent_coef:
    min: 0.0
    max: 0.3
  gae_lambda:
    min: 0.9
    max: 1.0
  gamma:
    value: 0.999

  # ---- training params (映射到 OnPolicyTrainerConfig) ----
  minibatch_size:
    values: [256, 512, 1024, 2048]
  update_epochs:
    values: [3, 5, 10]
  num_steps:
    values: [1024, 2048, 4096]
  total_steps:
    value: 20000000
  save_interval:
    value: 1000

  custom_configs.idi_scale:
    values: [0.0, 0.05, 0.1]
  custom_configs.contribution_scale:
    values: [0.0, 0.05, 0.1]