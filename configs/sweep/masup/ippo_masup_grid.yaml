method: bayes

metric:
  name: env/wi_fromT
  goal: minimize

parameters:
  seed:
    value: 42
  lr:
    min: 1.0e-6
    max: 1.0e-3
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.5
    max: 2.0
  ent_coef:
    min: 0.0
    max: 0.3
  gae_lambda:
    min: 0.9
    max: 1.0

  gamma:
    values: [0.97, 0.98, 0.99]

  use_value_norm:
    value: true

  num_steps:
    values: [512, 1024, 2048]
  minibatch_size:
    values: [512, 1024, 2048, 4096]
  update_epochs:
    values: [3, 5, 10]

  total_steps:
    value: 20000000

  save_interval:
    value: 500

  custom_configs.idi_scale:
    values: [0.0, 0.05, 0.1]
  custom_configs.contribution_scale:
    values: [0.0, 0.05, 0.1]

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 100  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [8, 32, 64]
  slope_threshold: 1.0e-4
