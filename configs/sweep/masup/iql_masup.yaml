#   python sweep.py --base-config configs/experiments/masup/iql_masup_longedge.yaml \
#                   --sweep-config configs/sweep/masup/iql_masup.yaml --count 24
#   python sweep.py --base-config configs/experiments/masup/iql_masup_longedge.yaml \
#                   --sweep-config configs/sweep/masup/iql_masup.yaml --create-only
#   python sweep.py --base-config configs/experiments/masup/iql_masup_longedge.yaml \
#                   --sweep-id <ID> --count 24
method: random

metric:
  name: eval/wi_fromT
  goal: minimize

parameters:
  seed:
    value: 42
  # ---- algo (IQLParams) ----
  lr:
    min: 3.0e-6
    max: 3.0e-4
    distribution: log_uniform_values

  gamma:
    values: [0.98, 0.99, 0.995]

  tau:
    value: 0.005

  target_update_freq:
    value: 1

  epsilon_start:
    value: 1.0

  epsilon_end:
    value: 0.05

  epsilon_decay_steps:
    values: [4279, 5990, 9985]

  max_grad_norm:
    value: 1.0

  use_double_dqn:
    value: true

  # ---- training (OffPolicyTrainerConfig) ----
  batch_size:
    values: [256, 512]

  buffer_size:
    value: 50000

  warmup_steps:
    value: 5000

  update_per_step:
    value: 1

  collect_per_step:
    value: 24

  num_steps:
    values: [64, 128]

  total_steps:
    value: 20000000

  save_interval:
    value: 500

early_terminate:
  min_trial: 6
  min_steps: 5000000
  terminate_ratio: 0.4
  early_stop_iters: 200
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
