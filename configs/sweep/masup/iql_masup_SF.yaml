# IQL + MASUP SF 超参数搜索（独立 Q + sync_replay）
#
# SF 图要点: 边权大、T=200 死区、长 episode；与 QMIX SF sweep 对齐 collect/num_steps/warmup 量级。
# num_steps 固定 512（每 env / iter），避免小值导致单 iter 内完不成 episode → reward N/A。
#
# 用法:
#   python sweep.py --base-config configs/experiments/masup/iql_masup_SF.yaml \
#                   --sweep-config configs/sweep/masup/iql_masup_SF.yaml --count 40

method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6
  min_steps: 5000000
  terminate_ratio: 0.4
  early_stop_iters: 500  
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  lr:
    min: 5.0e-6
    max: 1.0e-3
    distribution: log_uniform_values

  gamma:
    values: [0.99, 0.999]

  tau:
    value: 1.0

  target_update_freq:
    values: [500, 1000]

  epsilon_start:
    value: 1.0

  epsilon_end:
    value: 0.05

  epsilon_decay_steps:
    values: [10000000, 1500000]

  max_grad_norm:
    values: [1.0, 10.0]

  use_double_dqn:
    value: true

  sync_replay:
    value: true

  shared_policy:
    value: false

  batch_size:
    values: [256, 512, 1024]

  buffer_size:
    value: 1000000

  warmup_steps:
    value: 10000

  update_per_step:
    value: 1

  collect_per_step:
    value: 64

  num_steps:
    value: 512

  total_steps:
    value: 40000000

  save_interval:
    value: 1000
