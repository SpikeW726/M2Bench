# IQL + MASUP SF 超参数搜索（独立 Q + sync_replay）
#
# SF 图要点: 边权大、T=200 死区、长 episode；与 QMIX SF sweep 对齐 collect/num_steps/warmup 量级。
# num_steps 固定 512（每 env / iter），避免小值导致单 iter 内完不成 episode → reward N/A。
#
# 用法:
#   python sweep.py --base-config configs/experiments/masup/iql_masup_SF.yaml \
#                   --sweep-config configs/sweep/masup/iql_masup_SF.yaml --count 40

method: bayes

metric:
  name: env/wi_fromT
  goal: minimize

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6
  min_steps: 5000000
  terminate_ratio: 0.4
  early_stop_iters: 500    # 与 QMIX SF 一致，SF 死区长不宜过早做 slope 判断
  slope_horizons: [8, 32, 64]
  slope_threshold: 1.0e-4

parameters:
  lr:
    min: 5.0e-6
    max: 5.0e-4
    distribution: log_uniform_values

  gamma:
    values: [0.98, 0.99, 0.995]

  tau:
    values: [0.005, 0.05, 1.0]

  target_update_freq:
    values: [1, 200]

  epsilon_start:
    value: 1.0

  epsilon_end:
    values: [0.05, 0.01]

  # SF 需较慢 per-update 衰减；与 QMIX SF 同量级
  epsilon_decay:
    values: [0.9995, 0.9998, 0.99985]

  max_grad_norm:
    values: [0.5, 1.0]

  use_double_dqn:
    value: true

  sync_replay:
    value: true

  shared_policy:
    value: false

  batch_size:
    values: [256, 512, 1024]

  buffer_size:
    values: [50000, 100000]

  warmup_steps:
    values: [5000, 10000]

  update_per_step:
    values: [1, 2]

  collect_per_step:
    value: 24

  num_steps:
    value: 512

  total_steps:
    value: 20000000

  save_interval:
    value: 1000
