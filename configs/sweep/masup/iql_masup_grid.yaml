method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 200  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  lr:
    min: 1.0e-6
    max: 5.0e-4
    distribution: log_uniform_values

  gamma:
    values: [0.97, 0.98, 0.99]

  tau:
    min: 0.001
    max: 0.05
    distribution: log_uniform_values

  target_update_freq:
    values: [1, 5, 10]

  epsilon_start:
    value: 1.0

  epsilon_end:
    min: 0.01
    max: 0.1
    distribution: uniform

  epsilon_decay_steps:
    min: 300
    max: 3000
    distribution: uniform

  max_grad_norm:
    values: [0.5, 1.0, 10.0]

  use_double_dqn:
    value: true

  batch_size:
    values: [128, 256, 512]

  buffer_size:
    values: [20000, 50000, 100000]

  warmup_steps:
    values: [1000, 2000, 5000]

  update_per_step:
    values: [1, 2]

  collect_per_step:
    value: 24

  num_steps:
    values: [32, 64, 128]

  total_steps:
    value: 20000000

  save_interval:
    value: 500
