# MAPPO + MASUP LongEdge 超参数搜索（WandB Sweep）
# 用法:
#   python sweep.py --base-config configs/experiments/masup/mappo_masup_longedge_scratch.yaml \
#                   --sweep-config configs/sweep/masup/mappo_masup.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/masup/mappo_masup_longedge_scratch.yaml \
#                   --sweep-config configs/sweep/masup/mappo_masup.yaml --create-only
#   python sweep.py --base-config configs/experiments/masup/mappo_masup_longedge_scratch.yaml \
#                   --sweep-id <ID> --count 15

method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

parameters:
  seed:
    value: 42
  # ---- algo params (映射到 MAPPOParams) ----
  actor_lr:
    min: 1.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  critic_lr:
    min: 1.0e-6
    max: 5.0e-3
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.1
    max: 2.0
  ent_coef:
    min: 0.0
    max: 0.3
  gae_lambda:
    min: 0.9
    max: 1.0

  # LongEdge episode 极短（T=5, episode_len=100），gamma 无需特别高
  gamma:
    values: [0.97, 0.99, 0.999]

  # ---- training params (映射到 OnPolicyTrainerConfig) ----
  # LongEdge 短 episode，较小 rollout 即可覆盖多个完整 episode
  num_steps:
    values: [512, 1024, 2048]
  minibatch_size:
    values: [256, 512, 1024, 2048]
  update_epochs:
    values: [3, 5, 10]

  total_steps:
    value: 10000000
  save_interval:
    value: 1000

  custom_configs.idi_scale:
    values: [0.0, 0.05, 0.1]
  custom_configs.contribution_scale:
    values: [0.0, 0.05, 0.1]

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 100  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
