# MAPPO + MASUP SF 超参数搜索（WandB Sweep；基线 YAML 已启用 masup_mlp 异构预处理）
# 用法:
#   python sweep.py --base-config configs/experiments/masup/mappo_masup_SF_scratch.yaml \
#                   --sweep-config configs/sweep/masup/mappo_masup_SF.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/masup/mappo_masup_SF_scratch.yaml \
#                   --sweep-config configs/sweep/masup/mappo_masup_SF.yaml --create-only
#   python sweep.py --base-config configs/experiments/masup/mappo_masup_SF_scratch.yaml \
#                   --sweep-id <ID> --count 15

method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

parameters:
  seed:
    value: 42
  # ---- algo params (映射到 MAPPOParams) ----
  actor_lr:
    min: 1.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  critic_lr:
    min: 1.0e-5
    max: 5.0e-3
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.1
    max: 0.5
  ent_coef:
    min: 0.0
    max: 0.05
  gae_lambda:
    values: [0.95, 0.99, 0.999]

  # SF 地图 episode 极长（T=200, episode_len=3000），gamma 应偏高
  gamma:
    value: 0.999

  # use_value_norm 在长 episode / 大图上收益明显，固定开启
  use_value_norm:
    value: true

  # ---- training params (映射到 OnPolicyTrainerConfig) ----
  # SF 每轮 rollout 应覆盖更多 step，以减少「整轮无完整 episode」的概率
  num_steps:
    values: [2048, 4096, 8192]
  minibatch_size:
    values: [1024, 2048, 4096]
  update_epochs:
    values: [3, 5]

  total_steps:
    value: 50000000

  # SF 每个完整 episode 很长，save_interval 设小以便捕获早期良好 checkpoint
  save_interval:
    value: 200

  custom_configs.idi_scale:
    values: [0.0, 0.05, 0.1]
  custom_configs.contribution_scale:
    values: [0.0, 0.05, 0.1]

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6              # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 10000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4      # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 200     # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
