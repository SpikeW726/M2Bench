method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 5000000
  terminate_ratio: 0.4
  early_stop_iters: 50
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  total_steps:
    value: 20000000
  actor_lr:
    min: 1.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  critic_lr:
    min: 1.0e-5
    max: 5.0e-3
    distribution: log_uniform_values
  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.5
    max: 2.0
  ent_coef:
    min: 0.0
    max: 0.2
  gae_lambda:
    values: [0.95, 0.99, 0.999]
  gamma:
    values: [0.99, 0.999]
  use_value_norm:
    value: true
  num_steps:
    values: [512, 1024]
  minibatch_size:
    values: [512, 1024, 2048]
  update_epochs:
    values: [3, 5, 10]
  save_interval:
    value: 100
  custom_configs.idi_scale:
    values: [0.0, 0.05, 0.1]
  custom_configs.contribution_scale:
    values: [0.0, 0.05, 0.1]
