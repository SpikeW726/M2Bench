method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

parameters:
  seed:
    value: 42
  actor_lr:
    min: 1.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  critic_lr:
    min: 1.0e-5
    max: 5.0e-3
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.5
    max: 2.0
  ent_coef:
    min: 0.0
    max: 0.2
  gae_lambda:
    values: [0.95, 0.99, 0.999]

  # grid diameter=10, T=50 -- shorter horizon, gamma need not be as high as SF
  gamma:
    value: 0.999

  use_value_norm:
    value: true

  # grid episode_len=500, episodes complete frequently -- smaller rollout sufficient
  num_steps:
    values: [1024, 2048]
  minibatch_size:
    values: [512, 1024, 2048, 4096]
  update_epochs:
    values: [3, 5, 10]

  total_steps:
    value: 50000000

  save_interval:
    value: 200

  custom_configs.idi_scale:
    values: [0.0, 0.05, 0.1]
  custom_configs.contribution_scale:
    values: [0.0, 0.05, 0.1]

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 100  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
