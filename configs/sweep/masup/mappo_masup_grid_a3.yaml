method: bayes
metric:
  name: eval/wi_fromT
  goal: minimize
parameters:
  seed:
    value: 42
  actor_lr:
    min: 1.0e-06
    max: 0.001
    distribution: log_uniform_values
  critic_lr:
    min: 1.0e-05
    max: 0.005
    distribution: log_uniform_values
  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.5
    max: 1.0
  ent_coef:
    min: 0.0
    max: 0.2
  gae_lambda:
    values:
    - 0.99
    - 0.999
  gamma:
    value: 0.999
  use_value_norm:
    value: true
  num_steps:
    values:
    - 1024
    - 2048
  minibatch_size:
    values:
    - 1024
    - 2048
    - 4096
  update_epochs:
    values:
    - 3
    - 5
    - 10
  total_steps:
    value: 50000000
  save_interval:
    value: 200
  custom_configs.idi_scale:
    values:
    - 0.0
    - 0.05
    - 0.1
  custom_configs.contribution_scale:
    values:
    - 0.0
    - 0.05
    - 0.1
  actor_path:
    value: models/imi-mappo-pre-masup-grid-3a/imi_pre_masup_mlp_mappo_grid_3a__1780739956_final/policy.pt
  critic_path:
    value: models/imi-mappo-pre-masup-grid-3a/imi_pre_masup_mlp_mappo_grid_3a__1780739956_final/critic.pt
early_terminate:
  min_trial: 4
  min_steps: 15000000
  terminate_ratio: 0.4
  early_stop_iters: 100
  slope_horizons:
  - 16
  - 64
  - 128
  slope_threshold: 3.0e-05
