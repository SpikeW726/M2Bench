# QMIX + MASUPEnv 超参数搜索
# 用法:
#   python sweep.py --base-config configs/experiments/masup/qmix_masup_longedge.yaml \
#                   --sweep-config configs/sweep/masup/qmix_masup.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/masup/qmix_masup_longedge.yaml \
#                   --sweep-config configs/sweep/masup/qmix_masup.yaml --create-only
#   python sweep.py --base-config configs/experiments/masup/qmix_masup_longedge.yaml \
#                   --sweep-id <ID> --count 15

method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 200  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  # ---- algo params (映射到 QMIXParams) ----
  lr:
    min: 1.0e-6
    max: 5.0e-4
    distribution: log_uniform_values

  gamma:
    values: [0.97, 0.98, 0.99, 0.995]

  tau:
    values: [1.0]

  target_update_freq:
    values: [100, 200, 500]

  epsilon_start:
    value: 1.0

  epsilon_end:
    min: 0.01
    max: 0.1
    distribution: uniform

  epsilon_decay_steps:
    min: 3000
    max: 12000
    distribution: uniform

  max_grad_norm:
    values: [0.5, 1.0, 10.0]

  use_double_dqn:
    value: true

  mixer_embed_dim:
    values: [16, 32, 64]

  # ---- training params (映射到 OffPolicyTrainerConfig) ----
  batch_size:
    values: [128, 256, 512]

  buffer_size:
    values: [20000, 50000, 100000]

  warmup_steps:
    values: [2000, 5000, 10000]

  update_per_step:
    values: [1, 2]

  collect_per_step:
    value: 24

  num_steps:
    values: [32, 64, 128]

  total_steps:
    value: 20000000

  save_interval:
    value: 1000