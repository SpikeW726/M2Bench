# QMIX + MASUP SF 超参数搜索
#
# SF 图要点: 12 节点全连接、边权均值 ~27s、T=200 死区、episode_len=3000(仿真秒)、3 agent。
# num_steps=512 → 每 env 每轮 512 步，与 24 env 并行，通常每 iter 能完成多段 episode，避免 reward N/A。
#
# 用法:
#   python sweep.py --base-config configs/experiments/masup/qmix_masup_SF.yaml \
#                   --sweep-config configs/sweep/masup/qmix_masup_SF.yaml --count 40

method: random

metric:
  name: eval/wi_fromT
  goal: minimize

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 18000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 500    # SF 死区长、Q 传播慢，过小的 iter 易误判「平坦」早停
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  lr:
    min: 5.0e-6
    max: 1.0e-3
    distribution: log_uniform_values

  gamma:
    value: 0.999

  tau:
    value: 1.0

  target_update_freq:
    values: [500, 1000]

  epsilon_start:
    value: 1.0

  epsilon_end:
    value: 0.05

  # epsilon_decay_steps = global env step 数（与 IQL 一致）；total_steps=20M
  epsilon_decay_steps:
    value: 16000000

  max_grad_norm:
    values: [1.0, 10.0]

  use_double_dqn:
    value: true

  mixer_embed_dim:
    value: 256

  batch_size:
    values: [512, 1024]

  buffer_size:
    value: 500000

  warmup_steps:
    value: 10000

  update_per_step:
    value: 1

  collect_per_step:
    value: 108

  num_steps:
    value: 512

  total_steps:
    value: 40000000

  save_interval:
    value: 200

  peng_lambda:
    values: [0.3, 0.5]
