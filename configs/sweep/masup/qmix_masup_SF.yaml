#   python sweep.py --base-config configs/experiments/masup/qmix_masup_SF.yaml \
#                   --sweep-config configs/sweep/masup/qmix_masup_SF.yaml --count 40
method: random

metric:
  name: eval/wi_fromT
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 18000000
  terminate_ratio: 0.4
  early_stop_iters: 500
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  lr:
    min: 5.0e-6
    max: 1.0e-3
    distribution: log_uniform_values

  gamma:
    value: 0.999

  tau:
    value: 1.0

  target_update_freq:
    values: [200, 500, 1000]

  epsilon_start:
    value: 1.0

  epsilon_end:
    value: 0.05

  epsilon_decay_steps:
    value: 16000000

  max_grad_norm:
    values: [1.0, 10.0]

  use_double_dqn:
    value: true

  mixer_embed_dim:
    value: 256

  batch_size:
    values: [512, 1024]

  buffer_size:
    value: 500000

  warmup_steps:
    value: 10000

  update_per_step:
    value: 1

  collect_per_step:
    value: 108

  num_steps:
    value: 512

  total_steps:
    value: 40000000

  save_interval:
    value: 200

  peng_lambda:
    values: [0.3, 0.5]

  custom_configs.reward_scale:
    values: [0.01, 0.1]

  custom_configs.idi_scale:
    values: [0.0, 0.05]

  custom_configs.contribution_scale:
    values: [0.0, 0.05]