# VDN + MASUPEnv 超参数搜索
# 用法:
#   python sweep.py --base-config configs/experiments/masup/vdn_masup_longedge.yaml \
#                   --sweep-config configs/sweep/masup/vdn_masup.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/masup/vdn_masup_longedge.yaml \
#                   --sweep-config configs/sweep/masup/vdn_masup.yaml --create-only
#   python sweep.py --base-config configs/experiments/masup/vdn_masup_longedge.yaml \
#                   --sweep-id <ID> --count 15

method: bayes

metric:
  name: env/wi
  goal: minimize

early_terminate:
  type: hyperband
  min_iter: 1000
  eta: 3

parameters:
  # ---- algo params (映射到 VDNParams / IQLParams) ----
  lr:
    min: 5.0e-5
    max: 5.0e-4
    distribution: log_uniform_values

  gamma:
    values: [0.97, 0.98, 0.99, 0.995]

  tau:
    values: [1.0]              # VDN 常用 hard update

  target_update_freq:
    values: [100, 200, 500]

  epsilon_start:
    value: 1.0

  epsilon_end:
    min: 0.01
    max: 0.1
    distribution: uniform

  epsilon_decay:
    min: 0.990
    max: 0.999
    distribution: uniform

  max_grad_norm:
    values: [0.5, 1.0, 10.0]

  use_double_dqn:
    value: true

  # ---- training params (映射到 OffPolicyTrainerConfig) ----
  batch_size:
    values: [128, 256, 512]

  buffer_size:
    values: [20000, 50000, 100000]

  warmup_steps:
    values: [2000, 5000, 10000]

  update_per_step:
    values: [1, 2]

  collect_per_step:
    value: 12

  num_steps:
    values: [32, 64, 128]

  total_steps:
    value: 20000000

  save_interval:
    value: 500
