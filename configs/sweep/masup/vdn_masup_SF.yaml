# VDN + MASUPEnv 超参数搜索（SF 导向，32 trial 预算）
#
# SF 图关键特征（影响搜索设计）:
#   - 12 节点全连接，每节点出度 11，有效动作空间约 12（含 wait）
#   - 边权均值 27.3（deltaT=0.333 → 单边约耗 82 步），agent 大量时间在边上移动
#   - episode_len=3000，T=200，远比其他地图复杂
#   - reward_global 由 base experiment 决定（vdn_masup_SF.yaml 为 false）
#
# 用法:
#   python sweep.py --base-config configs/experiments/masup/vdn_masup_SF.yaml \
#                   --sweep-config configs/sweep/masup/vdn_masup_SF.yaml --count 32
#
# 并行（先 create-only 再多机跑）:
#   python sweep.py --base-config configs/experiments/masup/vdn_masup_SF.yaml \
#                   --sweep-config configs/sweep/masup/vdn_masup_SF.yaml --create-only
#   python sweep.py --base-config configs/experiments/masup/vdn_masup_SF.yaml \
#                   --sweep-id <ID> --count 32

method: random

metric:
  name: eval/wi_fromT
  goal: minimize

parameters:
  seed:
    value: 42
  # ---- algo (VDNParams) ----
  lr:
    # SF 全连接图损失曲面更平滑，可用稍大 lr；但也存在不稳定风险，因此拓宽上限
    min: 5.0e-6
    max: 5.0e-4
    distribution: log_uniform_values

  gamma:
    # 单边耗 82 步 → gamma=0.99 时单边折扣仅 0.44，T=200 范围内需长程规划
    # 0.999 有效视野约 1000 步，适合 SF 的长 episode
    values: [0.99, 0.995, 0.999]

  # 软更新 (tau=0.005, freq=1) 与 硬更新 (tau=1.0, freq=200) 均纳入搜索
  tau:
    value: 0.005

  target_update_freq:
    values: 1

  epsilon_start:
    value: 1.0

  epsilon_end:
    value: 0.05

  # epsilon_decay_steps = global env step 数，线性衰减至 epsilon_end（VDNAlgo._update_epsilon_linear）
  # total_steps=20M：取 5% / 12.5% / 25% 量级
  epsilon_decay_steps:
    values: [1000000, 2500000, 5000000]

  max_grad_norm:
    value: 1.0

  use_double_dqn:
    value: true

  # ---- training (OffPolicyTrainerConfig) ----
  batch_size:
    values: [256, 512]

  # SF 的 episode_len=3000；50000 仅约 2 轮完整 episode（共 24 env）
  # 100000 约 4 轮，确保 replay buffer 有足够多样性
  buffer_size:
    values: [50000, 100000]

  # SF 首轮 5000 步约覆盖 1-2 个完整 episode，热身足够
  warmup_steps:
    value: 5000

  update_per_step:
    value: 1

  collect_per_step:
    value: 64

  # SF 图长 episode，固定 num_steps=64 减少搜索维度
  num_steps:
    value: 64

  total_steps:
    value: 20000000

  save_interval:
    value: 500

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 200  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
