method: random

metric:
  name: eval/wi_fromT
  goal: minimize

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 200  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  lr:
    min: 1.0e-6
    max: 5.0e-4
    distribution: log_uniform_values

  gamma:
    values: [0.99, 0.999]

  tau:
    values: [1.0]

  target_update_freq:
    values: [100, 200, 500]

  epsilon_start:
    value: 1.0

  epsilon_end:
    value: 0.05

  epsilon_decay_steps:
    values: [10000000, 20000000]

  max_grad_norm:
    values: [1.0, 5.0, 10.0]

  use_double_dqn:
    value: true

  batch_size:
    values: [256, 512]

  buffer_size:
    values: [50000, 100000, 500000]

  warmup_steps:
    values: [10000, 20000]

  update_per_step:
    value: 1

  collect_per_step:
    value: 64

  num_steps:
    value: 2048

  total_steps:
    value: 50000000

  save_interval:
    value: 500
