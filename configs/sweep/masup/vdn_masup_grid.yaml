method: bayes

metric:
  name: env/wi_fromT
  goal: minimize

early_terminate:
  type: hyperband
  min_iter: 500
  eta: 3

parameters:
  lr:
    min: 1.0e-6
    max: 5.0e-4
    distribution: log_uniform_values

  gamma:
    values: [0.97, 0.98, 0.99]

  tau:
    values: [1.0]

  target_update_freq:
    values: [100, 200, 500]

  epsilon_start:
    value: 1.0

  epsilon_end:
    min: 0.01
    max: 0.1
    distribution: uniform

  epsilon_decay:
    min: 0.990
    max: 0.998
    distribution: uniform

  max_grad_norm:
    values: [0.5, 1.0, 10.0]

  use_double_dqn:
    value: true

  batch_size:
    values: [128, 256, 512]

  buffer_size:
    values: [20000, 50000, 100000]

  warmup_steps:
    values: [1000, 2000, 5000]

  update_per_step:
    values: [1, 2]

  collect_per_step:
    value: 24

  num_steps:
    values: [32, 64, 128]

  total_steps:
    value: 20000000

  save_interval:
    value: 500
