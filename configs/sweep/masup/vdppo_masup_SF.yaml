# VDPPO + MASUP SF 超参数搜索
# 基线 configs/experiments/masup/vdppo_masup_SF.yaml 已含：
#   masup_mlp / masup_vdppo_rnn、env.norm_reward、actor/q_network 预处理字段。
# sweep 仅覆盖 algo / training / custom_configs.*（见 apply_sweep_overrides）。
#
# 用法:
#   python sweep.py --base-config configs/experiments/masup/vdppo_masup_SF.yaml \
#                   --sweep-config configs/sweep/masup/vdppo_masup_SF.yaml --count 40

method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

parameters:
  seed:
    value: 42

  # 与基线 YAML 一致（MASUP 预处理 + VDPPO RNN Q）；勿改为 mlp/rnn 以免与 actor/q_network 段不匹配
  actor_type:
    value: masup_mlp
  q_type:
    value: masup_vdppo_rnn

  actor_lr:
    min: 1.0e-6
    max: 0.002
    distribution: log_uniform_values

  q_lr:
    min: 1.0e-6
    max: 0.003
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.3

  ent_coef:
    min: 0.001
    max: 0.05
    distribution: log_uniform_values

  vf_coef:
    min: 0.1
    max: 1.0

  gamma:
    values: [0.99, 0.995, 0.999]

  gae_lambda:
    min: 0.9
    max: 1.0

  tau:
    min: 0.01
    max: 0.5
    distribution: log_uniform_values

  target_update_freq:
    value: 1

  mixer_embed_dim:
    values: [32, 64, 128]

  data_chunk_length:
    value: 10

  minibatch_size:
    values: [2048, 4096, 8192]

  update_epochs:
    values: [3, 5, 10]

  num_steps:
    values: [2048, 4096]

  total_steps:
    value: 20000000

  save_interval:
    value: 500

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 100  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
