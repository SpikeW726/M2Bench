method: bayes

metric:
  name: env/wi_fromT
  goal: minimize

parameters:
  actor_lr:
    min: 1.0e-6
    max: 2.0e-3
    distribution: log_uniform_values

  q_lr:
    min: 1.0e-6
    max: 3.0e-3
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.3

  ent_coef:
    min: 0.001
    max: 0.05
    distribution: log_uniform_values

  vf_coef:
    min: 0.5
    max: 1.0

  gamma:
    values: [0.97, 0.98, 0.99]

  gae_lambda:
    min: 0.9
    max: 1.0

  tau:
    min: 0.01
    max: 0.5
    distribution: log_uniform_values

  target_update_freq:
    value: 1

  mixer_embed_dim:
    values: [32, 64, 128]

  data_chunk_length:
    value: 10

  num_steps:
    values: [512, 1024, 2048]
  minibatch_size:
    values: [512, 1024, 2048, 4096]
  update_epochs:
    values: [3, 5, 10]

  total_steps:
    value: 20000000

  save_interval:
    value: 500

# ---- 自定义早停 ----
early_terminate:
  min_trial: 6             # 前 N 个 trial 仅建立 milestone 基准
  min_steps: 5000000       # 达到该 env steps 后做 cross-trial 比较
  terminate_ratio: 0.4     # 指标不在前 40% 则早停（可根据地图特性调整）
  early_stop_iters: 100  # trial 内至少运行 N iters 后启用 slope 检查
  slope_horizons: [8, 32, 64]
  slope_threshold: 1.0e-4
