method: bayes

metric:
  name: env/wi_fromT
  goal: minimize

parameters:
  actor_lr:
    min: 1.0e-6
    max: 2.0e-3
    distribution: log_uniform_values

  q_lr:
    min: 1.0e-6
    max: 3.0e-3
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.3

  ent_coef:
    min: 0.001
    max: 0.05
    distribution: log_uniform_values

  vf_coef:
    min: 0.5
    max: 1.0

  gamma:
    values: [0.97, 0.98, 0.99]

  gae_lambda:
    min: 0.9
    max: 1.0

  tau:
    min: 0.01
    max: 0.5
    distribution: log_uniform_values

  target_update_freq:
    value: 1

  mixer_embed_dim:
    values: [32, 64, 128]

  data_chunk_length:
    value: 10

  num_steps:
    values: [512, 1024, 2048]
  minibatch_size:
    values: [512, 1024, 2048, 4096]
  update_epochs:
    values: [3, 5, 10]

  total_steps:
    value: 20000000

  save_interval:
    value: 500
