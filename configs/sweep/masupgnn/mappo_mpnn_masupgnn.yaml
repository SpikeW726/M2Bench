#     --base-config configs/experiments/masupgnn/mappo_mpnn_masupgnn_tsp12_sweep.yaml \
#     --sweep-config configs/sweep/masupgnn/mappo_mpnn_masupgnn.yaml \
#     --eval-config configs/eval/masupgnn/masup_gnn_tsp12.yaml \
#     --count 40
#   python sweep.py \
#     --base-config configs/experiments/masupgnn/mappo_masupgnn_SF.yaml \
#     --sweep-config configs/sweep/masupgnn/mappo_mpnn_masupgnn.yaml \
#     --eval-config configs/eval/masupgnn/masupgnn_SF.yaml \
#     --count 40
method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize


parameters:
  seed:
    value: 42
  actor_lr:
    min: 1.0e-5
    max: 1.0e-3
    distribution: log_uniform_values

  critic_lr:
    min: 1.0e-4
    max: 3.0e-3
    distribution: log_uniform_values

  # ---- MAPPOParams: PPO ----
  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.1
    max: 2.0
  ent_coef:
    min: 0.0
    max: 0.3
  gae_lambda:
    min: 0.9
    max: 1.0
  gamma:
    value: 0.999

  # ---- OnPolicyTrainerConfig ----
  minibatch_size:
    values: [1024, 2048, 4096]

  update_epochs:
    values: [3, 5, 10]

  num_steps:
    values: [1024, 2048, 4096]


  save_interval:
    value: 400
