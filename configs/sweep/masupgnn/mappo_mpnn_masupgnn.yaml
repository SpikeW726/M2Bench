# MAPPO + MPNN + MASUPGraphEnv (masup_gnn) 超参数搜索
#
# 用法:
#   python sweep.py \
#     --base-config configs/experiments/masupgnn/mappo_mpnn_masupgnn_tsp12_sweep.yaml \
#     --sweep-config configs/sweep/masupgnn/mappo_mpnn_masupgnn.yaml \
#     --eval-config configs/eval/masupgnn/masup_gnn_tsp12.yaml \
#     --count 40
#
# Step 预算：base config 中 total_steps=50M；sweep 调 num_steps 时 max_iterations 自动 ceil，各 trial 总步数 ≥ 50M

method: bayes

metric:
  name: env/wi_fromT
  goal: minimize

early_terminate:
  type: hyperband
  min_iter: 1000
  eta: 3

parameters:
  actor_lr:
    min: 1.0e-5
    max: 1.0e-3
    distribution: log_uniform_values

  critic_lr:
    min: 1.0e-4
    max: 3.0e-3
    distribution: log_uniform_values

  # ---- MAPPOParams: PPO ----
  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.1
    max: 2.0
  ent_coef:
    min: 0.0
    max: 0.3
  gae_lambda:
    min: 0.9
    max: 1.0
  gamma:
    value: 0.999

  # ---- OnPolicyTrainerConfig ----
  minibatch_size:
    values: [1024, 2048, 4096]   # 总数据量 16×2048=32768，minibatch 不超过总量

  update_epochs:
    values: [3, 5, 10]

  num_steps:
    values: [1024, 2048, 4096]

  total_steps:
    value: 20000000

  save_interval:
    value: 1000
