#   python sweep.py --base-config configs/experiments/masupgnn/mappo_masupgnn_grid.yaml \
#                   --sweep-config configs/sweep/masupgnn/mappo_mpnn_masupgnn_grid.yaml \
#                   --eval-config configs/eval/masupgnn/masupgnn_grid.yaml --count 40
method: bayes

metric:
  name: eval/wi_fromT
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 5000000
  terminate_ratio: 0.4
  early_stop_iters: 100
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42
  # ---- MAPPOParams ----
  actor_lr:
    min: 1.0e-5
    max: 5.0e-4
    distribution: log_uniform_values

  critic_lr:
    min: 1.0e-4
    max: 3.0e-3
    distribution: log_uniform_values

  clip_range:
    values: [0.15, 0.2, 0.25]

  vf_coef:
    min: 0.1
    max: 2.0

  ent_coef:
    min: 0.001
    max: 0.2
    distribution: log_uniform_values

  gae_lambda:
    min: 0.9
    max: 1.0

  gamma:
    values: [0.97, 0.98, 0.99]

  # ---- OnPolicyTrainerConfig ----
  num_steps:
    values: [256, 512, 1024]

  minibatch_size:
    values: [1024, 2048]

  update_epochs:
    values: [3, 5, 10]

  save_interval:
    value: 500

  custom_configs.idi_scale:
    values: [0.0, 0.05, 0.1]
  custom_configs.contribution_scale:
    values: [0.0, 0.05, 0.1]
