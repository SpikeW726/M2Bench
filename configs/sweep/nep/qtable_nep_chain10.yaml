method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 10000000
  terminate_ratio: 0.5
  early_stop_iters: 80
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
  state_file: .sweep_es_qtable_nep_chain10.json

parameters:
  seed:
    value: 42
  total_steps:
    value: 20000000
  lr:
    min: 1.0e-6
    max: 3.0e-3
    distribution: log_uniform_values
  gamma:
    values: [0.99, 0.999]
  epsilon_start:
    values: [0.5, 1.0]
  epsilon_end:
    value: 0.05
  save_interval:
    value: 150
  epsilon_decay_steps:
    values: [4000000, 8000000]
