#   python sweep.py --base-config configs/experiments/oucs/vdppo_gru_oucs_tsp12.yaml \
#                   --sweep-config configs/sweep/oucs/vdppo_gru_oucs.yaml --count 40
#   python sweep.py --base-config configs/experiments/oucs/vdppo_gru_oucs_tsp12.yaml \
#                   --sweep-config configs/sweep/oucs/vdppo_gru_oucs.yaml --create-only
#   python sweep.py --base-config configs/experiments/oucs/vdppo_gru_oucs_tsp12.yaml \
method: bayes

metric:
  name: eval/wi
  goal: minimize

parameters:
  seed:
    value: 42
  actor_lr:
    min: 0.00005
    max: 0.002
    distribution: log_uniform_values

  q_lr:
    min: 0.0001
    max: 0.003
    distribution: log_uniform_values

  # ---- PPOParams ----
  clip_range:
    min: 0.1
    max: 0.3

  ent_coef:
    min: 0.001
    max: 0.05
    distribution: log_uniform_values

  vf_coef:
    min: 0.1
    max: 1.0

  # ---- OnPolicyParams ----
  gamma:
    values: [0.99, 0.995, 0.999]

  gae_lambda:
    min: 0.9
    max: 1.0

  tau:
    min: 0.01
    max: 0.5
    distribution: log_uniform_values

  target_update_freq:
    value: 1

  mixer_embed_dim:
    values: [32, 64, 128]

  data_chunk_length:
    values: [8, 10, 16]

  # ---- OnPolicyTrainerConfig ----
  minibatch_size:
    values: [2048, 4096, 8192]

  update_epochs:
    values: [3, 5, 10]

  num_steps:
    # values: [1024, 2048, 4096]
    values: [4096, 8192]


  save_interval:
    value: 800
