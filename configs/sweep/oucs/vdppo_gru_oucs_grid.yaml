# VDPPO + GRU Actor/Q + OUCSEnv (grid) 超参数搜索
# 用法:
#   python sweep.py --base-config configs/experiments/oucs/vdppo_gru_oucs_grid.yaml \
#                   --sweep-config configs/sweep/oucs/vdppo_gru_oucs_grid.yaml \
#                   --eval-config configs/eval/oucs/oucs_grid.yaml --count 40
#
# grid 图: 50 节点，8 agents，均匀边权（均值≈2.2），episode_len=500 模拟秒（FixedStepEnv）
# steps_per_episode ≈ 500 步，gamma=0.99 已够，不必过高（比 SF=0.999 低）
# rollout num_steps=2048 → 覆盖约 4 个 episode（充分）

method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 10000000
  terminate_ratio: 0.4
  early_stop_iters: 150
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5

parameters:
  seed:
    value: 42

  actor_lr:
    min: 0.000005
    max: 0.001
    distribution: log_uniform_values

  q_lr:
    min: 0.00001
    max: 0.003
    distribution: log_uniform_values

  clip_range:
    min: 0.1
    max: 0.3

  ent_coef:
    min: 0.0
    max: 0.3

  vf_coef:
    min: 0.1
    max: 1.0

  # grid 短 horizon，gamma 不必过高
  gamma:
    values: [0.99, 0.999]

  gae_lambda:
    values: [0.95, 0.99, 0.999]

  tau:
    values: [0.01, 0.05, 0.1]

  target_update_freq:
    value: 5

  mixer_embed_dim:
    value: 256

  data_chunk_length:
    values: [8, 10, 16]

  minibatch_size:
    values: [1024, 2048]

  update_epochs:
    values: [3, 5, 10]

  # grid episode 完成频繁，num_steps 不必过大
  num_steps:
    values: [512, 1024]

  total_steps:
    value: 50000000

  save_interval:
    value: 200
