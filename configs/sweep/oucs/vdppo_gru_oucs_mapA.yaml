method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  min_trial: 6
  min_steps: 10000000
  terminate_ratio: 0.5
  early_stop_iters: 150
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5
  state_file: .sweep_es_vdppo_oucs_mapA.json

parameters:
  seed:
    value: 42
  total_steps:
    value: 50000000
  actor_lr:
    min: 5.0e-6
    max: 1.0e-3
    distribution: log_uniform_values
  q_lr:
    min: 1.0e-5
    max: 3.0e-3
    distribution: log_uniform_values
  clip_range:
    min: 0.1
    max: 0.3
  ent_coef:
    min: 0.0
    max: 0.3
  vf_coef:
    min: 0.1
    max: 1.0
  gamma:
    values: [0.99, 0.999]
  gae_lambda:
    values: [0.99, 0.999]
  tau:
    values: [0.01, 0.05, 0.1]
  target_update_freq:
    values: [1, 5]
  mixer_embed_dim:
    value: 256
  data_chunk_length:
    values: [8, 16]
  minibatch_size:
    values: [2048, 4096]
  update_epochs:
    values: [3, 5, 10]
  num_steps:
    values: [1024, 2048]
  save_interval:
    value: 300
