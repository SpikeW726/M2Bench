# Q-table 超参数搜索（适用于 BBLA / GBLA / ExGBLA 环境）
# 用法:
#   python sweep.py --base-config configs/experiments/qtable_bbla_tsp12.yaml \
#                   --sweep-config configs/sweep/qtable_hparam.yaml --count 40
#
#   python sweep.py --base-config configs/experiments/qtable_gbla_tsp12.yaml \
#                   --sweep-config configs/sweep/qtable_hparam.yaml --count 40
#
#   python sweep.py --base-config configs/experiments/qtable_ex_gbla_tsp12.yaml \
#                   --sweep-config configs/sweep/qtable_hparam.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/qtable_bbla_tsp12.yaml \
#                   --sweep-config configs/sweep/qtable_hparam.yaml --create-only
#   python sweep.py --base-config configs/experiments/qtable_bbla_tsp12.yaml \
#                   --sweep-id <ID> --count 15   # 各 tmux 窗口

method: bayes

metric:
  name: env/wi
  goal: minimize

early_terminate:
  type: median_stopping_rule
  min_iter: 1500
  min_samples_to_check: 6

parameters:
  # ---- algo params (映射到 QTableParams) ----
  lr:
    min: 0.01
    max: 0.9
    distribution: log_uniform_values

  gamma:
    values: [0.9, 0.99, 0.999]

  epsilon_start:
    values: [0.5, 0.8, 1.0]

  epsilon_end:
    min: 0.01
    max: 0.1
    distribution: uniform

  epsilon_decay:
    min: 0.9990
    max: 0.99999
    distribution: uniform

  # ---- training params (映射到 TrainerConfig) ----
  max_iterations:
    value: 1000

  save_interval:
    value: 1000
