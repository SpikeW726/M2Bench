# IQL + MLP + S4R1 超参数搜索
# 用法（示例 base 与 experiments/s4r1/ 下 yaml 对应）:
#   python sweep.py --base-config configs/experiments/s4r1/iql_s4r1_tsp12.yaml \
#                   --sweep-config configs/sweep/s4r1/iql_mlp_s4r1.yaml --count 40
#
# 并行:
#   python sweep.py --base-config configs/experiments/s4r1/iql_s4r1_tsp12.yaml \
#                   --sweep-config configs/sweep/s4r1/iql_mlp_s4r1.yaml --create-only
#   python sweep.py --base-config configs/experiments/s4r1/iql_s4r1_tsp12.yaml \
#                   --sweep-id <ID> --count 15   # 各 tmux 窗口
#
# 其它图: 替换 --base-config；total_steps 以各 experiment 的 training.total_steps 为准

method: bayes

metric:
  name: eval/wi
  goal: minimize

early_terminate:
  type: hyperband
  min_iter: 1000
  eta: 3

parameters:
  seed:
    value: 42
  # ---- algo params (映射到 IQLParams / D3QNParams) ----

  lr:
    min: 0.00005
    max: 0.003
    distribution: log_uniform_values

  gamma:
    values: [0.97, 0.98, 0.99, 0.995]

  tau:
    min: 0.001
    max: 0.01
    distribution: log_uniform_values

  target_update_freq:
    values: [1, 5, 10]

  epsilon_start:
    value: 1.0

  epsilon_end:
    min: 0.005
    max: 0.1
    distribution: uniform

  epsilon_decay_steps:
    min: 3000
    max: 70000
    distribution: uniform

  max_grad_norm:
    values: [0.5, 1.0, 10.0]

  use_double_dqn:
    value: true

  # ---- training params (映射到 OffPolicyTrainerConfig) ----
  batch_size:
    values: [128, 256, 512]

  buffer_size:
    values: [20000, 50000, 100000]

  warmup_steps:
    values: [5000, 10000, 20000]

  update_per_step:
    value: 1

  collect_per_step:
    value: 16

  num_steps:
    # values: [32, 64, 128]
    values: [4096, 8192]

  # total_steps 由各 experiment base 的 training.total_steps 决定（避免 sweep 覆盖不同图的预算）

  save_interval:
    value: 1000
