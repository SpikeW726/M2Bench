#                   --sweep-id <ID> --count 15
method: bayes

metric:
  name: eval/wi
  goal: minimize

parameters:
  seed:
    value: 42
  lr:
    min: 0.00001
    max: 0.0003
    distribution: log_uniform_values

  # ---- OnPolicyParams ----
  ent_coef:
    min: 0.0
    max: 0.01

  gamma:
    value: 0.999

  gae_lambda:
    min: 0.9
    max: 1.0

  max_grad_norm:
    values: [0.5, 1.0]

  # ---- OnPolicyTrainerConfig ----
  num_steps:
    values: [3072, 4096]

  minibatch_size:
    values: [1024, 2048, 4096]

  update_epochs:
    values: [1]

  save_interval:
    value: 1000

early_terminate:
  min_trial: 4
  min_steps: 15000000
  terminate_ratio: 0.5
  early_stop_iters: 60
  slope_horizons: [16, 64, 128]
  slope_threshold: 3.0e-5