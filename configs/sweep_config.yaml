# WandB Sweep 配置文件

method: random

metric:
  name: env/wi
  goal: minimize

early_terminate:
  type: median_stopping_rule
  min_iter: 800
  min_samples_to_check: 8

parameters:
  # 学习率 (对数均匀分布)
  actor_lr:
    min: 0.00001
    max: 0.001
    distribution: log_uniform_values
  critic_lr:
    min: 0.0001
    max: 0.003
    distribution: log_uniform_values

  # PPO 参数
  clip_range:
    min: 0.1
    max: 0.4
  vf_coef:
    min: 0.1
    max: 2.0
  ent_coef:
    min: 0.0
    max: 0.3
  gae_lambda:
    min: 0.9
    max: 1.0

  # 批次配置
  num_minibatches:
    values: [4, 8, 16, 32]
  update_epochs:
    values: [3, 5, 10]
  num_steps:
    values: [1024, 2048, 4096]

  # 折扣因子
  gamma:
    value: 0.999

  # 训练长度
  total_timesteps:
    value: 40000000  # 50M 步

  # 预训练权重
  actor_path:
    values: ["models/imi-pure-norm-random-init/imi_train__1770181266_final/policy.pt"]
  critic_path:
    values: ["models/imi-pure-norm-random-init/imi_train__1770181266_final/critic.pt"]

  # 保存间隔
  save_interval:
    value: 500
